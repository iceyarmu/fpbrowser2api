[server]
host = "0.0.0.0"
port = 8002

[global]
admin_username = "admin"
admin_password = "admin"
api_key = "fpb123456"

[system]
# 是否默认启用代理（影响自动化/对外请求）
proxy_enabled = false
proxy_url = ""

# 是否启用调试模式（更详细的日志）
debug_enabled = false

# 是否把日志写入本地文件（fpbrowser2api/app.log）
log_to_file = false

[ai_agent]
# 大模型中转站地址在代码中固定为 https://www.newtoken.club/，这里仅配置默认模型和默认 API Key。
# 也可用环境变量 AI_AGENT_API_KEY / NEWTOKEN_API_KEY / OPENAI_API_KEY 注入，优先级高于本配置。
default_model = "gpt-5.5"
api_key = ""

# VEO 2K 放大图为 JPEG 字节；启用后上传到 OSS，任务结果里 upsample_url 存公网 URL，避免大 base64 撑爆数据库
[oss]
enabled = false
endpoint = "https://oss-cn-hangzhou.aliyuncs.com"
region = "cn-hangzhou"
bucket = "your-bucket"
public_base_url = "https://your-cdn.example.com/"
# 密钥可用 access_key_id / access_key_secret，或 OSS_ACCESS_KEY_ID / OSS_ACCESS_KEY_SECRET（与 comfyui_async_service 一致）
# access_key_id = ""
# access_key_secret = ""

