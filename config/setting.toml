[server]
host = "0.0.0.0"
port = 8000

[global]
admin_username = "admin"
admin_password = "admin"
api_key = "mirrmart_sora2_880315"

[system]
proxy_enabled = false
proxy_url = ""
debug_enabled = false
log_to_file = false

[extension_executor]
# 是否全局默认使用浏览器插件执行器；false 时可在单个任务 payload 里传 executor="extension" 启用
enabled = true
# 指纹浏览器插件连接 Python 后端的 WebSocket 地址。
# 注意：如果 Python 和指纹浏览器不在同一台电脑，这里必须填 Python 后端的局域网 IP，不能用 127.0.0.1。
bridge_url = "ws://192.168.1.4:8000/api/extension/ws"
# 可选鉴权 token；留空则不校验
bridge_token = ""
task_timeout_seconds = 1800

# VEO 2K：enabled=true 时上传 JPEG 到 OSS，upsample_url 为 URL；false 时仍为 data:image/jpeg;base64,...（占库容大）
[oss]
enabled = false
endpoint = ""
region = ""
bucket = ""
public_base_url = ""
OSS_ACCESS_KEY_ID= ""
OSS_ACCESS_KEY_SECRET= ""