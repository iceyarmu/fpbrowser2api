<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>智能体测试 - Mirr矩阵</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/admin-nav.css" rel="stylesheet" />
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .small-muted { color: #6c757d; font-size: .875rem; }
      .agent-toolbar .form-label { margin-bottom: .25rem; font-size: .82rem; color: #6c757d; }
      .agent-toolbar .form-select,
      .agent-toolbar .form-control,
      .agent-toolbar .btn { min-height: 38px; }
      .chat-card .card-body {
        height: calc(100vh - 250px);
        min-height: 520px;
        display: flex;
        flex-direction: column;
      }
      .chat-shell {
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        background: linear-gradient(180deg, #f8f9fa 0%, #eef3ff 100%);
      }
      .composer { flex: 0 0 auto; background: #fff; }
      .composer textarea { resize: none; }
      .msg-wrap { display: flex; margin-bottom: .7rem; }
      .msg {
        max-width: min(860px, 86%);
        border-radius: 16px;
        padding: .78rem .95rem;
        white-space: pre-wrap;
        word-break: break-word;
        box-shadow: 0 1px 2px rgba(16, 24, 40, .05);
      }
      .msg-user { margin-left: auto; background: #0d6efd; color: #fff; border-bottom-right-radius: 4px; }
      .msg-assistant { margin-right: auto; background: #fff; border: 1px solid #dfe3ea; border-bottom-left-radius: 4px; }
      .welcome {
        border: 1px dashed #b6c6e3;
        background: rgba(255, 255, 255, .72);
        border-radius: 16px;
      }
      .status-dot {
        width: .58rem;
        height: .58rem;
        display: inline-block;
        border-radius: 999px;
        background: #adb5bd;
      }
      .status-dot.ok { background: #198754; }
      @media (max-width: 768px) {
        .chat-card .card-body { height: calc(100vh - 300px); min-height: 460px; }
        .msg { max-width: 94%; }
      }
    </style>
  </head>
  <body class="bg-light">
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <nav class="navbar navbar-dark bg-dark admin-top-nav">
      <div class="container-fluid">
        <a class="navbar-brand" href="/admin/system">Mirr矩阵</a>
        <div class="navbar-nav me-auto">
          <a class="nav-link" data-nav="system" href="/admin/system">系统配置</a>
          <a class="nav-link" data-nav="projects" href="/admin/projects">项目管理</a>
          <a class="nav-link" data-nav="task_types" href="/admin/task-types">任务类型管理</a>
          <a class="nav-link" data-nav="tasks" href="/admin/tasks">任务列表</a>
          <a class="nav-link" data-nav="test" href="/admin/test">测试</a>
          <a class="nav-link" data-nav="network_capture" href="/admin/network-capture">网络抓取</a>
          <a class="nav-link" data-nav="agent" href="/admin/agent">智能体</a>
          <a class="nav-link" data-nav="paypal" href="/admin/paypal">PayPal管理</a>
          <a class="nav-link" data-nav="image_resources" href="/admin/image-resources">图片资源</a>
          <a class="nav-link" data-nav="card_keys" href="/admin/card-keys">卡密管理</a>
          <a class="nav-link" data-nav="logs" href="/admin/logs">请求日志</a>
          <a class="nav-link" data-nav="users" href="/admin/users">用户管理</a>
        </div>
        <a class="btn btn-outline-info btn-sm me-3" href="https://github.com/lakysir/fpbrowser2api" target="_blank" rel="noopener noreferrer">源码部署</a>
        <span class="navbar-text text-light small me-3">Telegram：<span class="font-monospace">@newtoken_me</span></span>
        <a class="btn btn-outline-info btn-sm me-3" href="https://www.newtoken.club/" target="_blank" rel="noopener noreferrer">[官方中转站]</a>
        <span class="navbar-text text-light small font-monospace me-3" data-role="navbarClock" title="当前时间"></span>
        <button class="btn btn-outline-light btn-sm" id="btnLogout">退出</button>
      </div>
    </nav>

    <div class="container-fluid py-3">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
        <div>
          <h3 class="mb-1">智能体测试</h3>
          <div class="text-muted">对话只保存在当前浏览器本地缓存；API Key 可本地保存，也可由管理员保存到数据库。</div>
        </div>
        <div class="d-flex flex-wrap align-items-center gap-2">
          <button class="btn btn-outline-primary btn-sm" id="btnOpenRegister">打开注册 / 获取 API Key</button>
          <button class="btn btn-outline-secondary btn-sm" id="btnExport">导出对话</button>
          <button class="btn btn-outline-danger btn-sm" id="btnClear">清空对话</button>
        </div>
      </div>

      <div class="card shadow-sm mb-3 agent-toolbar">
        <div class="card-body py-3">
          <div class="row g-2 align-items-end">
            <div class="col-12 col-md-3 col-xl-2">
              <label class="form-label">模型</label>
              <select class="form-select form-select-sm mono" id="modelSelect"></select>
            </div>
            <div class="col-12 col-md-5 col-xl-4">
              <label class="form-label">
                API Key
                <span class="small-muted ms-1" id="apiKeyHint"></span>
              </label>
              <input class="form-control form-control-sm mono" type="password" id="apiKey" autocomplete="off" placeholder="留空则使用数据库/服务端默认 Key" />
            </div>
            <div class="col-12 col-md-4 col-xl-3">
              <label class="form-label">保存方式</label>
              <div class="btn-group w-100" role="group">
                <button class="btn btn-outline-primary btn-sm" id="btnSaveLocalKey">本机</button>
                <button class="btn btn-outline-success btn-sm" id="btnSaveDbKey">数据库</button>
                <button class="btn btn-outline-secondary btn-sm" id="btnForgetKey">忘记</button>
              </div>
            </div>
            <div class="col-12 col-xl-3">
              <label class="form-label">状态</label>
              <div class="border rounded px-2 py-2 bg-white small d-flex align-items-center gap-2">
                <span class="status-dot" id="keyStatusDot"></span>
                <span id="keyStatusText">加载中...</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm chat-card">
        <div class="card-body p-0">
          <div id="chatBox" class="chat-shell p-3"></div>
          <div class="composer border-top p-3">
            <div class="input-group">
              <textarea class="form-control" id="userInput" rows="2" placeholder="输入消息，Ctrl+Enter 发送"></textarea>
              <button class="btn btn-primary px-4" id="btnSend">发送</button>
            </div>
            <div class="small-muted mt-2 d-flex flex-wrap justify-content-between gap-2">
              <span>支持连续上下文对话，记录仅保存在本机浏览器缓存。</span>
              <span class="mono" id="localCount">0 messages</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { adminFetch, toast, setActiveNav, logout, escapeHtml, initAdminPage } from "/assets/app.js";

      initAdminPage("agent");
      setActiveNav("agent");
      document.getElementById("btnLogout").addEventListener("click", logout);

      const STATION_REGISTER_URL = "https://www.newtoken.club/";
      const DEFAULT_SYSTEM_PROMPT = "我是newtoken.club网站逆向分析助手，一个专业的指纹浏览器技术专家，精通playwrite。";
      const LS_PREFIX = "fpbrowser2api.admin.agent.";
      const LS = {
        model: `${LS_PREFIX}model`,
        apiKey: `${LS_PREFIX}api_key`,
        messages: `${LS_PREFIX}messages`,
      };
      const FALLBACK_MODELS = [
        { id: "gpt-5.5", endpoint_path: "/v1/responses", api_type: "responses" },
        { id: "claude-opus-4-6", endpoint_path: "/v1/chat/completions", api_type: "chat_completions" },
        { id: "claude-sonnet-4-6", endpoint_path: "/v1/chat/completions", api_type: "chat_completions" },
        { id: "claude-opus-4-7", endpoint_path: "/v1/chat/completions", api_type: "chat_completions" },
      ];

      let models = FALLBACK_MODELS;
      let messages = [];
      let sending = false;
      let hasDbApiKey = false;
      let hasDefaultApiKey = false;

      function lsGet(k) { try { return localStorage.getItem(k); } catch { return null; } }
      function lsSet(k, v) { try { localStorage.setItem(k, v ?? ""); } catch {} }
      function lsDel(k) { try { localStorage.removeItem(k); } catch {} }

      function updateKeyStatus() {
        const localKey = !!document.getElementById("apiKey").value.trim();
        const dot = document.getElementById("keyStatusDot");
        const text = document.getElementById("keyStatusText");
        dot.classList.toggle("ok", localKey || hasDefaultApiKey);
        if (localKey) text.textContent = "正在使用本机输入的 API Key";
        else if (hasDbApiKey) text.textContent = "已配置数据库 API Key，留空可直接使用";
        else if (hasDefaultApiKey) text.textContent = "已配置服务端默认 API Key，留空可直接使用";
        else text.textContent = "尚未配置 API Key，请填写或点击上方按钮获取";
        document.getElementById("apiKeyHint").textContent = hasDbApiKey ? "数据库已配置" : "";
      }

      function loadLocal() {
        const savedKey = lsGet(LS.apiKey);
        if (savedKey) document.getElementById("apiKey").value = savedKey;
        try {
          const arr = JSON.parse(lsGet(LS.messages) || "[]");
          messages = Array.isArray(arr) ? arr.filter(m => ["user","assistant"].includes(m.role) && typeof m.content === "string") : [];
        } catch { messages = []; }
      }

      function saveMessages() {
        lsSet(LS.messages, JSON.stringify(messages.slice(-80)));
        document.getElementById("localCount").textContent = `${messages.length} messages`;
      }

      function renderMessages() {
        const box = document.getElementById("chatBox");
        if (!messages.length) {
          box.innerHTML = `
            <div class="welcome p-4 text-center">
              <h5 class="mb-2">开始测试智能体</h5>
              <div class="text-muted mb-3">先选择模型并配置 API Key，然后输入你的测试问题。上下文会自动随对话一起提交。</div>
              <div class="small-muted">示例：帮我分析一个指纹浏览器页面自动化登录流程应该如何拆解。</div>
            </div>
          `;
        } else {
          box.innerHTML = messages.map(m => {
            const cls = m.role === "user" ? "msg-user" : "msg-assistant";
            const name = m.role === "user" ? "你" : "智能体";
            return `<div class="msg-wrap"><div class="msg ${cls}"><div class="small fw-bold mb-1">${escapeHtml(name)}</div>${escapeHtml(m.content || "")}</div></div>`;
          }).join("");
        }
        box.scrollTop = box.scrollHeight;
        document.getElementById("localCount").textContent = `${messages.length} messages`;
      }

      async function loadConfig() {
        const r = await adminFetch("/api/admin/ai-agent/config");
        if (!r) return;
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || "加载智能体配置失败");
        models = Array.isArray(d.models) && d.models.length ? d.models : FALLBACK_MODELS;
        hasDbApiKey = !!d.has_db_api_key;
        hasDefaultApiKey = !!d.has_default_api_key;
        const sel = document.getElementById("modelSelect");
        sel.innerHTML = models.map(m => `<option value="${escapeHtml(m.id)}">${escapeHtml(m.id)}</option>`).join("");
        const saved = lsGet(LS.model);
        const target = saved || d.default_model || "gpt-5.5";
        if (Array.from(sel.options).some(o => o.value === target)) sel.value = target;
        else sel.value = "gpt-5.5";
        updateKeyStatus();
      }

      function buildRequestMessages() {
        return [
          { role: "system", content: DEFAULT_SYSTEM_PROMPT },
          ...messages,
        ];
      }

      async function sendMessage() {
        if (sending) return;
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if (!text) return;
        const model = document.getElementById("modelSelect").value || "gpt-5.5";
        const apiKey = document.getElementById("apiKey").value.trim();
        if (!apiKey && !hasDefaultApiKey) {
          toast("请先填写 API Key，或由管理员保存数据库 API Key", "warn");
          return;
        }

        messages.push({ role: "user", content: text });
        input.value = "";
        renderMessages();
        saveMessages();
        sending = true;
        const btn = document.getElementById("btnSend");
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm me-1"></span>发送中`;
        try {
          const r = await adminFetch("/api/admin/ai-agent/chat", {
            method: "POST",
            body: JSON.stringify({
              model,
              api_key: apiKey || null,
              messages: buildRequestMessages(),
              temperature: 0.2,
              max_tokens: 4096,
            }),
          });
          if (!r) return;
          const d = await r.json();
          if (!r.ok) throw new Error(d.detail || "智能体调用失败");
          messages.push({ role: "assistant", content: d.answer || "" });
          saveMessages();
          renderMessages();
        } catch (e) {
          messages.push({ role: "assistant", content: `调用失败：${e.message || e}` });
          saveMessages();
          renderMessages();
          toast(e.message || "调用失败", "error");
        } finally {
          sending = false;
          btn.disabled = false;
          btn.textContent = "发送";
        }
      }

      async function saveDbKey() {
        const key = document.getElementById("apiKey").value.trim();
        if (!key) {
          toast("请先输入要保存到数据库的 API Key", "warn");
          return;
        }
        const model = document.getElementById("modelSelect").value || "gpt-5.5";
        const r = await adminFetch("/api/admin/ai-agent/config", {
          method: "POST",
          body: JSON.stringify({ api_key: key, default_model: model }),
        });
        if (!r) return;
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || "保存数据库 Key 失败");
        hasDbApiKey = !!d.has_db_api_key;
        hasDefaultApiKey = hasDefaultApiKey || hasDbApiKey;
        updateKeyStatus();
        toast("API Key 已保存到数据库", "success");
      }

      function bindEvents() {
        document.getElementById("modelSelect").addEventListener("change", e => {
          lsSet(LS.model, e.target.value || "gpt-5.5");
        });
        document.getElementById("apiKey").addEventListener("input", updateKeyStatus);
        document.getElementById("btnSaveLocalKey").addEventListener("click", () => {
          const v = document.getElementById("apiKey").value.trim();
          if (v) {
            lsSet(LS.apiKey, v);
            toast("API Key 已保存到本机", "success");
          } else {
            lsDel(LS.apiKey);
            toast("本机 API Key 已清空", "success");
          }
          updateKeyStatus();
        });
        document.getElementById("btnSaveDbKey").addEventListener("click", () => {
          saveDbKey().catch(e => toast(e.message || "保存失败", "error"));
        });
        document.getElementById("btnForgetKey").addEventListener("click", () => {
          document.getElementById("apiKey").value = "";
          lsDel(LS.apiKey);
          updateKeyStatus();
          toast("已从本机忘记 API Key", "success");
        });
        document.getElementById("btnOpenRegister").addEventListener("click", () => {
          window.open(STATION_REGISTER_URL, "_blank", "noopener,noreferrer");
        });
        document.getElementById("btnSend").addEventListener("click", sendMessage);
        document.getElementById("userInput").addEventListener("keydown", e => {
          if (e.key === "Enter" && e.ctrlKey) {
            e.preventDefault();
            sendMessage();
          }
        });
        document.getElementById("btnClear").addEventListener("click", () => {
          if (!confirm("确认清空本机缓存的对话记录？")) return;
          messages = [];
          saveMessages();
          renderMessages();
        });
        document.getElementById("btnExport").addEventListener("click", () => {
          const payload = {
            model: document.getElementById("modelSelect").value,
            system: DEFAULT_SYSTEM_PROMPT,
            messages,
            exported_at: new Date().toISOString(),
          };
          const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = `ai-agent-chat-${Date.now()}.json`;
          a.click();
          URL.revokeObjectURL(a.href);
        });
      }

      async function init() {
        loadLocal();
        bindEvents();
        await loadConfig();
        renderMessages();
      }
      init().catch(e => toast(e.message || "初始化失败", "error"));
    </script>
  </body>
</html>
