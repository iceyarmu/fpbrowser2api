<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 - FPBrowser2API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
          <div class="text-center mb-4">
            <h1 class="h3 mb-1">FPBrowser2API</h1>
            <div class="text-muted small">指纹浏览器管理后台</div>
          </div>

          <div class="card shadow-sm">
            <div class="card-body p-4">
              <form id="loginForm">
                <div class="mb-3">
                  <label class="form-label">账号</label>
                  <input class="form-control" name="username" autocomplete="username" required />
                </div>
                <div class="mb-3">
                  <label class="form-label">密码</label>
                  <input class="form-control" name="password" type="password" autocomplete="current-password" required />
                </div>
                <button id="btnLogin" class="btn btn-primary w-100" type="submit">登录</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { setAdminToken, toast } from "/assets/app.js";

      const form = document.getElementById("loginForm");
      const btn = document.getElementById("btnLogin");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        btn.disabled = true;
        btn.textContent = "登录中...";
        try {
          const fd = new FormData(form);
          const r = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: fd.get("username"),
              password: fd.get("password"),
            }),
          });
          const d = await r.json();
          if (!r.ok) throw new Error(d.detail || "登录失败");
          setAdminToken(d.token);
          window.location.href = "/admin/system";
        } catch (err) {
          toast(err.message || "登录失败", "error");
        } finally {
          btn.disabled = false;
          btn.textContent = "登录";
        }
      });
    </script>
  </body>
</html>
