<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>图片资源 - Mirr矩阵</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/admin-nav.css" rel="stylesheet" />
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
  </head>
  <body class="bg-light">
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
    <nav class="navbar navbar-dark bg-dark admin-top-nav">
      <div class="container-fluid">
        <a class="navbar-brand" href="/admin/system">Mirr矩阵</a>
        <div class="navbar-nav me-auto">
          <a class="nav-link" data-nav="system" href="/admin/system">系统配置</a>
          <a class="nav-link" data-nav="projects" href="/admin/projects">项目管理</a>
          <a class="nav-link" data-nav="task_types" href="/admin/task-types">任务类型管理</a>
          <a class="nav-link" data-nav="tasks" href="/admin/tasks">任务列表</a>
          <a class="nav-link" data-nav="test" href="/admin/test">测试</a>
          <a class="nav-link" data-nav="agent" href="/admin/agent">智能体</a>
          <a class="nav-link" data-nav="paypal" href="/admin/paypal">PayPal管理</a>
          <a class="nav-link" data-nav="image_resources" href="/admin/image-resources">图片资源</a>
          <a class="nav-link" data-nav="card_keys" href="/admin/card-keys">卡密管理</a>
          <a class="nav-link" data-nav="logs" href="/admin/logs">请求日志</a>
          <a class="nav-link" data-nav="users" href="/admin/users">用户管理</a>
        </div>
        <a class="btn btn-outline-info btn-sm me-3" href="https://github.com/lakysir/fpbrowser2api" target="_blank" rel="noopener noreferrer">源码部署</a>
        <span class="navbar-text text-light small me-3">Telegram：<span class="font-monospace">@newtoken_me</span></span>
        <a class="btn btn-outline-info btn-sm me-3" href="https://www.newtoken.club/" target="_blank" rel="noopener noreferrer">[官方中转站]</a>
        <span class="navbar-text text-light small font-monospace me-3" data-role="navbarClock" title="当前时间"></span>
        <button class="btn btn-outline-light btn-sm" id="btnLogout">退出</button>
      </div>
    </nav>

    <div class="container py-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex align-items-center mb-3 gap-2">
            <h5 class="card-title mb-0">图片角色资源管理</h5>
            <button class="btn btn-outline-secondary btn-sm ms-auto" id="btnRefresh">刷新</button>
          </div>
          <div class="table-responsive">
            <table class="table table-sm table-striped align-middle mb-0">
              <thead>
                <tr>
                  <th style="width:80px;">ID</th>
                  <th style="width:180px;">name</th>
                  <th style="width:170px;">uid</th>
                  <th>内部地址</th>
                  <th style="width:120px;">尺寸</th>
                  <th style="width:150px;">subject_id</th>
                  <th style="width:150px;">data_id</th>
                  <th style="width:170px;">创建时间</th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
          <div class="d-flex align-items-center justify-content-between border-top pt-3 mt-3">
            <span class="text-muted small" id="pageInfo"></span>
            <div class="btn-group btn-group-sm">
              <button class="btn btn-outline-secondary" id="btnPrev">上一页</button>
              <button class="btn btn-outline-secondary" id="btnNext">下一页</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { adminFetch, toast, setActiveNav, logout, escapeHtml, initAdminPage } from "/assets/app.js";
      initAdminPage("image_resources");
      setActiveNav("image_resources");
      document.getElementById("btnLogout").addEventListener("click", logout);

      let limit = 50;
      let offset = 0;
      let total = 0;

      function render(items) {
        const tbody = document.getElementById("tbody");
        if (!items.length) {
          tbody.innerHTML = `<tr><td colspan="8" class="text-center text-muted py-4">暂无图片资源</td></tr>`;
        } else {
          tbody.innerHTML = items.map(x => {
            const uri = String(x.image_uri || "");
            return `<tr>
              <td class="mono">${escapeHtml(String(x.id || ""))}</td>
              <td>${escapeHtml(x.name || "")}</td>
              <td class="mono small">${escapeHtml(x.uid || "")}</td>
              <td class="mono small text-break">${escapeHtml(uri)}</td>
              <td class="mono">${escapeHtml(String(x.width || 0))}×${escapeHtml(String(x.height || 0))}</td>
              <td class="mono small">${escapeHtml(x.subject_id || "")}</td>
              <td class="mono small">${escapeHtml(x.data_id || "")}</td>
              <td class="mono small">${escapeHtml(x.created_at || "")}</td>
            </tr>`;
          }).join("");
        }
        const start = total ? offset + 1 : 0;
        const end = Math.min(total, offset + limit);
        document.getElementById("pageInfo").textContent = `共 ${total} 条，当前 ${start}-${end}`;
        document.getElementById("btnPrev").disabled = offset <= 0;
        document.getElementById("btnNext").disabled = offset + limit >= total;
      }

      async function load() {
        const r = await adminFetch(`/api/admin/image-resources?limit=${limit}&offset=${offset}`);
        if (!r) return;
        const d = await r.json();
        if (!r.ok || !d.success) {
          toast(d.detail || "加载失败", "error");
          return;
        }
        total = Number(d.total || 0);
        render(Array.isArray(d.items) ? d.items : []);
      }

      document.getElementById("btnRefresh").addEventListener("click", () => load());
      document.getElementById("btnPrev").addEventListener("click", () => { offset = Math.max(0, offset - limit); load(); });
      document.getElementById("btnNext").addEventListener("click", () => { if (offset + limit < total) { offset += limit; load(); } });
      load();
    </script>
  </body>
</html>
