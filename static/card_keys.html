<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>卡密管理 - FPBrowser2API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
  </head>
  <body class="bg-light">
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/admin/system">FPBrowser2API</a>
        <div class="navbar-nav me-auto">
          <a class="nav-link" data-nav="system" href="/admin/system">系统配置</a>
          <a class="nav-link" data-nav="projects" href="/admin/projects">项目管理</a>
          <a class="nav-link" data-nav="task_types" href="/admin/task-types">任务类型管理</a>
          <a class="nav-link" data-nav="tasks" href="/admin/tasks">任务列表</a>
          <a class="nav-link" data-nav="tasks_gantt" href="/admin/tasks-gantt">成功失败甘特</a>
          <a class="nav-link" data-nav="test" href="/admin/test">测试</a>
          <a class="nav-link" data-nav="card_keys" href="/admin/card-keys">卡密管理</a>
          <a class="nav-link" data-nav="logs" href="/admin/logs">请求日志</a>
          <a class="nav-link" data-nav="users" href="/admin/users">用户管理</a>
        </div>
        <span class="navbar-text text-light small font-monospace me-3" data-role="navbarClock" title="当前时间"></span>
        <button class="btn btn-outline-light btn-sm" id="btnLogout">退出</button>
      </div>
    </nav>

    <div class="container py-4">
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h5 class="card-title">批量导入卡密（每行一个）</h5>
          <textarea class="form-control mono" id="importText" rows="10" placeholder="每行一个卡密"></textarea>
          <div class="d-flex justify-content-end mt-3">
            <button class="btn btn-primary" id="btnImport">一键导入</button>
          </div>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex align-items-center mb-3">
            <h5 class="card-title mb-0">卡密列表</h5>
            <a class="btn btn-link btn-sm ms-3 p-0" href="https://chong.databrain.sbs/" target="_blank" rel="noopener noreferrer">充值入口</a>
            <button class="btn btn-outline-secondary btn-sm ms-auto" id="btnRefresh">刷新</button>
          </div>
          <div class="table-responsive">
            <table class="table table-sm table-striped align-middle mb-0">
              <thead>
                <tr>
                  <th style="width: 100px;">ID</th>
                  <th>卡密</th>
                  <th style="width: 220px;">更新时间</th>
                  <th style="width: 260px;">操作</th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
          <nav id="paginationNav" class="d-flex align-items-center justify-content-between border-top pt-3 mt-3" style="display:none;">
            <span class="text-muted small" id="pageInfo"></span>
            <div class="d-flex align-items-center gap-2">
              <label class="text-muted small mb-0 me-1">每页</label>
              <select class="form-select form-select-sm" id="pageSizeSelect" style="width:auto;">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
              <button class="btn btn-outline-secondary btn-sm" id="btnFirstPage" title="首页">&laquo;</button>
              <button class="btn btn-outline-secondary btn-sm" id="btnPrevPage" title="上一页">&lsaquo;</button>
              <span class="badge bg-primary" id="pageNum" style="min-width:3em;"></span>
              <button class="btn btn-outline-secondary btn-sm" id="btnNextPage" title="下一页">&rsaquo;</button>
              <button class="btn btn-outline-secondary btn-sm" id="btnLastPage" title="末页">&raquo;</button>
            </div>
          </nav>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { adminFetch, toast, setActiveNav, logout, escapeHtml, initAdminPage } from "/assets/app.js";

      initAdminPage("card_keys");
      setActiveNav("card_keys");
      document.getElementById("btnLogout").addEventListener("click", logout);

      let cardKeys = [];
      let currentPage = 1;
      let pageSize = 20;

      function totalPages() {
        return Math.max(1, Math.ceil(cardKeys.length / pageSize));
      }

      function renderPagination() {
        const nav = document.getElementById("paginationNav");
        const total = totalPages();
        nav.style.display = cardKeys.length ? "" : "none";
        nav.classList.toggle("d-none", !cardKeys.length);

        document.getElementById("pageInfo").textContent =
          `共 ${cardKeys.length} 条，第 ${currentPage}/${total} 页`;
        document.getElementById("pageNum").textContent = `${currentPage} / ${total}`;

        document.getElementById("btnFirstPage").disabled = currentPage <= 1;
        document.getElementById("btnPrevPage").disabled = currentPage <= 1;
        document.getElementById("btnNextPage").disabled = currentPage >= total;
        document.getElementById("btnLastPage").disabled = currentPage >= total;
      }

      function renderTable() {
        const tbody = document.getElementById("tbody");
        if (!cardKeys.length) {
          tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4">暂无卡密</td></tr>`;
          renderPagination();
          return;
        }
        if (currentPage > totalPages()) currentPage = totalPages();
        const start = (currentPage - 1) * pageSize;
        const pageItems = cardKeys.slice(start, start + pageSize);
        tbody.innerHTML = pageItems.map((x) => {
          const id = Number(x.id || 0);
          const displayId = x.id ?? "-";
          const key = String(x.card_key || "");
          const updatedAt = x.updated_at || x.created_at || "-";
          return `
            <tr>
              <td class="mono">${escapeHtml(String(displayId))}</td>
              <td class="mono">${escapeHtml(key)}</td>
              <td class="mono small">${escapeHtml(String(updatedAt))}</td>
              <td>
                <button class="btn btn-outline-success btn-sm me-2" data-act="check" data-id="${id}">检测</button>
                <button class="btn btn-outline-primary btn-sm me-2" data-act="edit" data-id="${id}">修改</button>
                <button class="btn btn-outline-danger btn-sm" data-act="del" data-id="${id}">删除</button>
              </td>
            </tr>
          `;
        }).join("");
        renderPagination();
      }

      async function loadCardKeys() {
        const r = await adminFetch("/api/admin/card-keys");
        if (!r) return;
        const d = await r.json();
        cardKeys = Array.isArray(d.items) ? d.items : [];
        renderTable();
      }

      async function importCardKeys() {
        const content = (document.getElementById("importText").value || "").trim();
        if (!content) {
          toast("请先输入卡密内容", "warn");
          return;
        }
        const r = await adminFetch("/api/admin/card-keys/import", {
          method: "POST",
          body: JSON.stringify({ content }),
        });
        if (!r) return;
        const d = await r.json();
        if (!r.ok) {
          toast(d.detail || "导入失败", "error");
          return;
        }
        toast(`导入完成：新增 ${d.inserted || 0}，跳过 ${d.skipped || 0}`, "success");
        await loadCardKeys();
      }

      async function updateOne(id) {
        const current = cardKeys.find(x => Number(x.id) === Number(id));
        if (!current) return;
        const nextVal = (window.prompt("请输入新的卡密：", String(current.card_key || "")) || "").trim();
        if (!nextVal) return;
        const r = await adminFetch(`/api/admin/card-keys/${encodeURIComponent(String(id))}`, {
          method: "PUT",
          body: JSON.stringify({ card_key: nextVal }),
        });
        if (!r) return;
        const d = await r.json();
        if (!r.ok) {
          toast(d.detail || "修改失败", "error");
          return;
        }
        toast("修改成功", "success");
        await loadCardKeys();
      }

      async function deleteOne(id) {
        if (!window.confirm("确认删除该卡密？")) return;
        const r = await adminFetch(`/api/admin/card-keys/${encodeURIComponent(String(id))}`, { method: "DELETE" });
        if (!r) return;
        const d = await r.json();
        if (!r.ok) {
          toast(d.detail || "删除失败", "error");
          return;
        }
        toast("删除成功", "success");
        await loadCardKeys();
      }

      function makeSign() {
        return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (ch) => {
          const random = Math.floor(Math.random() * 16);
          const value = ch === "x" ? random : ((random & 0x3) | 0x8);
          return value.toString(16);
        });
      }

      async function checkOne(id) {
        const current = cardKeys.find((x) => Number(x.id) === Number(id));
        if (!current) {
          toast("未找到对应卡密", "warn");
          return;
        }
        const cdk = String(current.card_key || "").trim();
        if (!cdk) {
          toast("卡密为空，无法检测", "warn");
          return;
        }
        const btn = document.querySelector(`button[data-act="check"][data-id="${id}"]`);
        const oldText = btn ? btn.textContent : "";
        if (btn) {
          btn.disabled = true;
          btn.textContent = "检测中...";
        }
        try {
          const resp = await fetch("https://chong.databrain.sbs/api/vip/c", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              cdk,
              sign: makeSign(),
              timestamp: Date.now(),
            }),
          });
          const data = await resp.json().catch(() => ({}));
          if (resp.ok && Number(data.code) === 1) {
            toast(`卡密未被使用：${cdk}`, "success");
          } else {
            const msg = data.message || "卡密已被使用或不可用";
            toast(`检测结果：${msg}`, "warn");
          }
        } catch (err) {
          toast(`检测失败：${err?.message || "网络异常"}`, "error");
        } finally {
          if (btn) {
            btn.disabled = false;
            btn.textContent = oldText || "检测";
          }
        }
      }

      document.getElementById("btnImport").addEventListener("click", importCardKeys);
      document.getElementById("btnRefresh").addEventListener("click", loadCardKeys);

      document.getElementById("btnFirstPage").addEventListener("click", () => { currentPage = 1; renderTable(); });
      document.getElementById("btnPrevPage").addEventListener("click", () => { if (currentPage > 1) { currentPage--; renderTable(); } });
      document.getElementById("btnNextPage").addEventListener("click", () => { if (currentPage < totalPages()) { currentPage++; renderTable(); } });
      document.getElementById("btnLastPage").addEventListener("click", () => { currentPage = totalPages(); renderTable(); });
      document.getElementById("pageSizeSelect").addEventListener("change", (e) => {
        pageSize = Number(e.target.value) || 20;
        currentPage = 1;
        renderTable();
      });

      document.getElementById("tbody").addEventListener("click", async (e) => {
        const btn = e.target.closest("button[data-act]");
        if (!btn) return;
        const act = btn.getAttribute("data-act");
        const id = Number(btn.getAttribute("data-id") || 0);
        if (!id) return;
        if (act === "check") await checkOne(id);
        if (act === "edit") await updateOne(id);
        if (act === "del") await deleteOne(id);
      });

      loadCardKeys();
    </script>
  </body>
</html>
