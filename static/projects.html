<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>项目管理 - FPBrowser2API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .small2 { font-size: 12px; }
      .cursor { cursor: pointer; }

      /* 让浏览器头部信息与操作按钮保持同一行 */
      .browser-header { display: flex; align-items: center; gap: 8px; min-width: 0; }
      .browser-trigger { flex: 1 1 auto; min-width: 0; }
      .browser-meta { display: flex; align-items: center; gap: 8px; min-width: 0; }
      .browser-lan { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .browser-actions { flex: 0 0 auto; display: flex; gap: 6px; }
    </style>
  </head>
  <body class="bg-light">
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/admin/system">FPBrowser2API</a>
        <div class="navbar-nav me-auto">
          <a class="nav-link" data-nav="system" href="/admin/system">系统配置</a>
          <a class="nav-link" data-nav="projects" href="/admin/projects">项目管理</a>
          <a class="nav-link" data-nav="task_types" href="/admin/task-types">任务类型管理</a>
          <a class="nav-link" data-nav="tasks" href="/admin/tasks">任务列表</a>
          <a class="nav-link" data-nav="test" href="/admin/test">测试</a>
          <a class="nav-link" data-nav="logs" href="/admin/logs">请求日志</a>
        </div>
        <button class="btn btn-outline-light btn-sm" id="btnLogout">退出</button>
      </div>
    </nav>

    <div class="container py-4">
      <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
        <div class="me-2 fw-semibold">项目</div>
        <select id="projectSelect" class="form-select" style="max-width: 320px;"></select>
        <button class="btn btn-primary btn-sm" id="btnNewProject">新增项目</button>
        <button class="btn btn-outline-secondary btn-sm" id="btnEditProject">修改项目</button>
        <button class="btn btn-outline-danger btn-sm" id="btnDeleteProject">删除项目</button>
        <span class="text-muted small ms-auto">提示：窗口信息不可编辑，只能“同步”更新。</span>
      </div>

      <div class="d-flex flex-wrap gap-2 mb-3">
        <button class="btn btn-outline-primary btn-sm" id="btnNewBrowser">新增指纹浏览器</button>
        <button class="btn btn-outline-secondary btn-sm" id="btnExpandAll">一键展开全部</button>
        <button class="btn btn-outline-secondary btn-sm" id="btnCollapseAll">一键收起全部</button>
        <button class="btn btn-outline-secondary btn-sm" id="btnRefreshTree">刷新</button>
      </div>

      <div id="treeContainer"></div>
    </div>

    <!-- Project Modal -->
    <div class="modal fade" id="projectModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="projectModalTitle">项目</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="projectId" />
            <label class="form-label">项目名称</label>
            <input class="form-control" id="projectName" />
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
            <button class="btn btn-primary" id="btnSaveProject">保存</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Browser Modal -->
    <div class="modal fade" id="browserModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="browserModalTitle">指纹浏览器</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="browserId" />
            <div class="mb-3">
              <label class="form-label">名称</label>
              <input class="form-control" id="browserName" />
            </div>
            <div class="mb-3">
              <label class="form-label">局域网地址</label>
              <input class="form-control mono" id="browserLan" placeholder="http://192.168.1.10:50000" />
            </div>
            <div class="mb-3">
              <label class="form-label">Vendor</label>
              <input class="form-control mono" id="browserVendor" placeholder="roxy / generic" />
              <div class="form-text">用于选择同步协议（可先填 generic）。</div>
            </div>
            <div class="mb-3">
              <label class="form-label">Access Key（可选）</label>
              <input class="form-control mono" id="browserKey" placeholder="指纹浏览器侧 API key" />
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
            <button class="btn btn-primary" id="btnSaveBrowser">保存</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Space Modal -->
    <div class="modal fade" id="spaceModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="spaceModalTitle">空间</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="spacePk" />
            <input type="hidden" id="spaceBrowserId" />
            <div class="mb-3">
              <label class="form-label">空间名称</label>
              <input class="form-control" id="spaceName" />
            </div>
            <div class="mb-3">
              <label class="form-label">空间ID</label>
              <input class="form-control mono" id="spaceId" />
            </div>
            <div class="mb-3">
              <label class="form-label">项目ID（可选）</label>
              <input class="form-control mono" id="spaceProjectIds" placeholder="10,11" />
              <div class="form-text">用于 RoxyBrowser `/browser/list_v3` 的 `projectIds` 过滤参数；多个用英文逗号分隔。</div>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
            <button class="btn btn-primary" id="btnSaveSpace">保存</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { adminFetch, toast, setActiveNav, logout, escapeHtml } from "/assets/app.js";

      setActiveNav("projects");
      document.getElementById("btnLogout").addEventListener("click", logout);

      const projectSelect = document.getElementById("projectSelect");
      const treeContainer = document.getElementById("treeContainer");

      const projectModal = new bootstrap.Modal("#projectModal");
      const browserModal = new bootstrap.Modal("#browserModal");
      const spaceModal = new bootstrap.Modal("#spaceModal");

      let state = { projects: [], tree: [] };
      const LS_LAST_PROJECT_ID = "fpbrowser2api.last_project_id";

      function currentProjectId() {
        const v = projectSelect.value;
        return v ? parseInt(v, 10) : null;
      }

      async function loadProjects() {
        const r = await adminFetch("/api/admin/projects");
        if (!r) return;
        const d = await r.json();
        state.projects = d.projects || [];
        projectSelect.innerHTML = state.projects
          .map(p => `<option value="${p.id}">#${p.id} ${escapeHtml(p.name)}</option>`)
          .join("");

        const saved = localStorage.getItem(LS_LAST_PROJECT_ID);
        if (saved && state.projects.some(p => String(p.id) === saved)) {
          projectSelect.value = saved;
        } else if (state.projects[0]) {
          projectSelect.value = String(state.projects[0].id);
        } else {
          projectSelect.value = "";
          localStorage.removeItem(LS_LAST_PROJECT_ID);
        }

        if (projectSelect.value) localStorage.setItem(LS_LAST_PROJECT_ID, projectSelect.value);
      }

      async function loadTree() {
        const pid = currentProjectId();
        if (!pid) {
          treeContainer.innerHTML = `<div class="alert alert-info">请先创建一个项目。</div>`;
          return;
        }
        const r = await adminFetch(`/api/admin/tree?project_id=${pid}`);
        if (!r) return;
        const d = await r.json();
        state.tree = d.tree || [];
        renderTree();
      }

      function renderTree() {
        const p = state.tree[0];
        if (!p) {
          treeContainer.innerHTML = `<div class="alert alert-info">暂无数据。</div>`;
          return;
        }

        const accordionId = "accBrowsers";
        const html = `
          <div class="accordion" id="${accordionId}">
            ${(p.browsers || []).map((b, bi) => renderBrowser(b, accordionId, bi)).join("")}
          </div>
        `;
        treeContainer.innerHTML = html;

        // bind buttons
        treeContainer.querySelectorAll("[data-action]").forEach(btn => {
          btn.addEventListener("click", (e) => handleAction(btn.dataset.action, btn.dataset, e.currentTarget));
        });
      }

      function renderBrowser(b, parentId, idx) {
        const bId = `b_${b.id}`;
        const collapseId = `collapse_${bId}`;
        const headingId = `heading_${bId}`;
        return `
          <div class="accordion-item mb-2 shadow-sm">
            <h2 class="accordion-header" id="${headingId}">
              <div class="browser-header">
                <button class="accordion-button collapsed browser-trigger" type="button" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                  <div class="browser-meta w-100">
                    <div class="fw-semibold text-nowrap">${escapeHtml(b.name)}</div>
                    <span class="badge text-bg-light mono border text-nowrap">#${b.id}</span>
                    <span class="badge text-bg-secondary text-nowrap">${escapeHtml(b.vendor || "generic")}</span>
                    <span class="text-muted small mono browser-lan">${escapeHtml(b.lan_addr || "")}</span>
                  </div>
                </button>
                <div class="browser-actions">
                  <button class="btn btn-outline-secondary btn-sm" type="button" data-action="edit_browser" data-browser='${encodeURIComponent(JSON.stringify(b))}'>修改</button>
                  <button class="btn btn-outline-danger btn-sm" type="button" data-action="delete_browser" data-browser_id="${b.id}">删除</button>
                  <button class="btn btn-outline-primary btn-sm" type="button" data-action="new_space" data-browser_id="${b.id}">新增空间</button>
                </div>
              </div>
            </h2>
            <div id="${collapseId}" class="accordion-collapse collapse" data-bs-parent="#${parentId}">
              <div class="accordion-body">
                ${(b.spaces || []).length ? (b.spaces || []).map(s => renderSpace(s)).join("") : `<div class="text-muted small">暂无空间</div>`}
              </div>
            </div>
          </div>
        `;
      }

      function renderSpace(s) {
        const sid = `s_${s.id}`;
        const table = renderWindowsTable(s.windows || [], s.id);
        const pidBadge = (s.project_ids || "").trim()
          ? `<span class="badge text-bg-light mono border">projectIds:${escapeHtml((s.project_ids || "").trim())}</span>`
          : "";
        return `
          <div class="card mb-3" data-role="spaceCard" data-space-pk="${s.id}">
            <div class="card-header d-flex flex-wrap gap-2 align-items-center">
              <div class="fw-semibold">${escapeHtml(s.name)}</div>
              <span class="badge text-bg-light mono border">#${s.id}</span>
              <span class="badge text-bg-light mono border">${escapeHtml(s.space_id)}</span>
              ${pidBadge}
              <span class="ms-auto"></span>
              <button class="btn btn-outline-secondary btn-sm" type="button" data-action="edit_space" data-space='${encodeURIComponent(JSON.stringify(s))}'>修改</button>
              <button class="btn btn-outline-danger btn-sm" type="button" data-action="delete_space" data-space_pk="${s.id}">删除</button>
              <button class="btn btn-primary btn-sm" type="button" data-action="sync_space" data-space_pk="${s.id}">同步窗口</button>
            </div>
            <div class="card-body">
              <div class="mb-2" data-role="syncProgress" data-space-pk="${s.id}"></div>
              <div data-role="windowsWrap" data-space-pk="${s.id}">
                ${table}
              </div>
            </div>
          </div>
        `;
      }

      function renderWindowsTable(windows, spacePk) {
        if (!windows.length) return `<div class="text-muted small">暂无窗口信息，点击“同步窗口”获取。</div>`;
        return `
          <div class="table-responsive">
            <table class="table table-sm align-middle">
              <thead>
                <tr class="small2">
                  <th>窗口ID</th>
                  <th>窗口名称</th>
                  <th>账号</th>
                  <th>网址</th>
                  <th>代理</th>
                  <th>国家</th>
                  <th>到期</th>
                  <th>启用</th>
                  <th>删除</th>
                </tr>
              </thead>
              <tbody data-role="windowsTbody" data-space-pk="${escapeHtml(String(spacePk ?? ""))}">
                ${windows.map(w => `
                  <tr class="small2">
                    <td class="mono text-muted">#${escapeHtml(String(w.id ?? "-"))}</td>
                    <td class="fw-semibold">${escapeHtml(w.window_name)}</td>
                    <td>${escapeHtml(w.platform_account || "-")}</td>
                    <td class="mono">${w.platform_url ? `<a target="_blank" href="${escapeHtml(w.platform_url)}">${escapeHtml(w.platform_url)}</a>` : "-"}</td>
                    <td class="mono">${escapeHtml(w.proxy_addr || "-")}</td>
                    <td>${escapeHtml(w.proxy_country || "-")}</td>
                    <td>${escapeHtml(w.proxy_expire_at || "-")}</td>
                    <td>${w.enabled ? `<span class="badge text-bg-success">是</span>` : `<span class="badge text-bg-secondary">否</span>`}</td>
                    <td>${w.deleted ? `<span class="badge text-bg-danger">是</span>` : `<span class="badge text-bg-secondary">否</span>`}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      }

      function handleAction(action, ds, fromEl) {
        if (action === "edit_browser") {
          const b = JSON.parse(decodeURIComponent(ds.browser));
          openBrowserModal("edit", b);
        } else if (action === "delete_browser") {
          deleteBrowser(parseInt(ds.browser_id, 10));
        } else if (action === "new_space") {
          openSpaceModal("new", { browser_id: parseInt(ds.browser_id, 10) });
        } else if (action === "edit_space") {
          const s = JSON.parse(decodeURIComponent(ds.space));
          openSpaceModal("edit", s);
        } else if (action === "delete_space") {
          deleteSpace(parseInt(ds.space_pk, 10));
        } else if (action === "sync_space") {
          syncSpace(parseInt(ds.space_pk, 10), fromEl);
        }
      }

      function setBtnBusy(btn, busy, { loadingText = "处理中" } = {}) {
        if (!btn) return;
        if (busy) {
          if (btn.dataset.origHtml == null) btn.dataset.origHtml = btn.innerHTML;
          btn.disabled = true;
          btn.innerHTML = `
            <span class="spinner-border spinner-border-sm me-1" aria-hidden="true"></span>
            <span>${escapeHtml(loadingText)}</span>
          `;
          return;
        }
        btn.disabled = false;
        if (btn.dataset.origHtml != null) btn.innerHTML = btn.dataset.origHtml;
      }

      function getSpaceDom(spacePk) {
        const progress = document.querySelector(`[data-role="syncProgress"][data-space-pk="${spacePk}"]`);
        const wrap = document.querySelector(`[data-role="windowsWrap"][data-space-pk="${spacePk}"]`);
        const tbody = document.querySelector(`[data-role="windowsTbody"][data-space-pk="${spacePk}"]`);
        return { progress, wrap, tbody };
      }

      function setSpaceProgress(spacePk, { current = 0, total = 0, text = "" } = {}) {
        const { progress } = getSpaceDom(spacePk);
        if (!progress) return;
        if (!text) {
          progress.innerHTML = "";
          return;
        }
        const pct = total > 0 ? Math.min(100, Math.max(0, Math.round((current / total) * 100))) : 0;
        progress.innerHTML = `
          <div class="small text-muted mb-1">${escapeHtml(text)}</div>
          <div class="progress" style="height: 6px;">
            <div class="progress-bar" role="progressbar" style="width: ${pct}%"></div>
          </div>
        `;
      }

      function ensureWindowsTableSkeleton(spacePk) {
        const { wrap, tbody } = getSpaceDom(spacePk);
        if (!wrap) return null;
        if (tbody) return tbody;
        wrap.innerHTML = `
          <div class="table-responsive">
            <table class="table table-sm align-middle">
              <thead>
                <tr class="small2">
                  <th>窗口ID</th>
                  <th>窗口名称</th>
                  <th>账号</th>
                  <th>网址</th>
                  <th>代理</th>
                  <th>国家</th>
                  <th>到期</th>
                  <th>启用</th>
                  <th>删除</th>
                </tr>
              </thead>
              <tbody data-role="windowsTbody" data-space-pk="${escapeHtml(String(spacePk))}"></tbody>
            </table>
          </div>
        `;
        return document.querySelector(`[data-role="windowsTbody"][data-space-pk="${spacePk}"]`);
      }

      function rowHtmlForWindow(w) {
        return `
          <tr class="small2">
            <td class="mono text-muted">#${escapeHtml(String(w.id ?? "-"))}</td>
            <td class="fw-semibold">${escapeHtml(w.window_name)}</td>
            <td>${escapeHtml(w.platform_account || "-")}</td>
            <td class="mono">${w.platform_url ? `<a target="_blank" href="${escapeHtml(w.platform_url)}">${escapeHtml(w.platform_url)}</a>` : "-"}</td>
            <td class="mono">${escapeHtml(w.proxy_addr || "-")}</td>
            <td>${escapeHtml(w.proxy_country || "-")}</td>
            <td>${escapeHtml(w.proxy_expire_at || "-")}</td>
            <td>${w.enabled ? `<span class="badge text-bg-success">是</span>` : `<span class="badge text-bg-secondary">否</span>`}</td>
            <td>${w.deleted ? `<span class="badge text-bg-danger">是</span>` : `<span class="badge text-bg-secondary">否</span>`}</td>
          </tr>
        `;
      }

      async function renderWindowsIncrementally(spacePk, windows) {
        const { wrap } = getSpaceDom(spacePk);
        if (!wrap) return;
        if (!windows || !windows.length) {
          wrap.innerHTML = `<div class="text-muted small">暂无窗口信息，点击“同步窗口”获取。</div>`;
          setSpaceProgress(spacePk, { text: "" });
          return;
        }
        const tb = ensureWindowsTableSkeleton(spacePk);
        if (!tb) return;
        tb.innerHTML = "";

        const total = windows.length;
        let idx = 0;
        const chunkSize = total <= 200 ? 1 : 10;

        setSpaceProgress(spacePk, { current: 0, total, text: `加载窗口：0/${total}` });

        await new Promise(resolve => {
          const pump = () => {
            const end = Math.min(total, idx + chunkSize);
            let html = "";
            for (; idx < end; idx += 1) html += rowHtmlForWindow(windows[idx]);
            if (html) tb.insertAdjacentHTML("beforeend", html);
            setSpaceProgress(spacePk, { current: end, total, text: `加载窗口：${end}/${total}` });
            if (end >= total) return resolve();
            window.setTimeout(pump, 0);
          };
          pump();
        });
      }

      function openProjectModal(mode) {
        document.getElementById("projectModalTitle").textContent = mode === "new" ? "新增项目" : "修改项目";
        if (mode === "new") {
          document.getElementById("projectId").value = "";
          document.getElementById("projectName").value = "";
        } else {
          const pid = currentProjectId();
          const p = state.projects.find(x => x.id === pid);
          document.getElementById("projectId").value = String(pid);
          document.getElementById("projectName").value = p ? p.name : "";
        }
        projectModal.show();
      }

      async function saveProject() {
        const pid = document.getElementById("projectId").value;
        const name = document.getElementById("projectName").value.trim();
        if (!name) return toast("请输入项目名称", "error");
        let r;
        if (!pid) {
          r = await adminFetch("/api/admin/projects", { method: "POST", body: JSON.stringify({ name }) });
        } else {
          r = await adminFetch(`/api/admin/projects/${pid}`, { method: "PUT", body: JSON.stringify({ name }) });
        }
        if (!r) return;
        const d = await r.json();
        if (!r.ok) return toast(d.detail || "保存失败", "error");
        projectModal.hide();
        toast("保存成功", "success");
        await loadProjects();
        if (!pid && d.project_id) projectSelect.value = String(d.project_id);
        if (projectSelect.value) localStorage.setItem(LS_LAST_PROJECT_ID, projectSelect.value);
        await loadTree();
      }

      async function deleteProject() {
        const pid = currentProjectId();
        if (!pid) return;
        if (!confirm("确定删除该项目吗？")) return;
        const r = await adminFetch(`/api/admin/projects/${pid}`, { method: "DELETE" });
        if (!r) return;
        const d = await r.json();
        if (!r.ok) return toast(d.detail || "删除失败", "error");
        toast("已删除", "success");
        await loadProjects();
        if (projectSelect.value) localStorage.setItem(LS_LAST_PROJECT_ID, projectSelect.value);
        await loadTree();
      }

      function openBrowserModal(mode, b) {
        document.getElementById("browserModalTitle").textContent = mode === "new" ? "新增指纹浏览器" : "修改指纹浏览器";
        document.getElementById("browserId").value = mode === "new" ? "" : String(b.id);
        document.getElementById("browserName").value = b?.name || "";
        document.getElementById("browserLan").value = b?.lan_addr || "";
        document.getElementById("browserVendor").value = b?.vendor || "generic";
        document.getElementById("browserKey").value = b?.access_key || "";
        browserModal.show();
      }

      async function saveBrowser() {
        const pid = currentProjectId();
        if (!pid) return toast("请先选择项目", "error");
        const bid = document.getElementById("browserId").value;
        const name = document.getElementById("browserName").value.trim();
        const lan_addr = document.getElementById("browserLan").value.trim();
        const vendor = document.getElementById("browserVendor").value.trim() || "generic";
        const access_key = document.getElementById("browserKey").value.trim() || null;
        if (!name || !lan_addr) return toast("请填写名称与局域网地址", "error");
        let r;
        if (!bid) {
          r = await adminFetch("/api/admin/browsers", { method: "POST", body: JSON.stringify({ project_id: pid, name, lan_addr, vendor, access_key }) });
        } else {
          r = await adminFetch(`/api/admin/browsers/${bid}`, { method: "PUT", body: JSON.stringify({ name, lan_addr, vendor, access_key }) });
        }
        if (!r) return;
        const d = await r.json();
        if (!r.ok) return toast(d.detail || "保存失败", "error");
        browserModal.hide();
        toast("保存成功", "success");
        await loadTree();
      }

      async function deleteBrowser(browserId) {
        if (!confirm("确定删除该指纹浏览器吗？")) return;
        const r = await adminFetch(`/api/admin/browsers/${browserId}`, { method: "DELETE" });
        if (!r) return;
        const d = await r.json();
        if (!r.ok) return toast(d.detail || "删除失败", "error");
        toast("已删除", "success");
        await loadTree();
      }

      function openSpaceModal(mode, s) {
        document.getElementById("spaceModalTitle").textContent = mode === "new" ? "新增空间" : "修改空间";
        document.getElementById("spacePk").value = mode === "new" ? "" : String(s.id);
        document.getElementById("spaceBrowserId").value = String(s.browser_id || "");
        if (mode === "new") {
          document.getElementById("spaceName").value = "";
          document.getElementById("spaceId").value = "";
          document.getElementById("spaceProjectIds").value = "";
        } else {
          document.getElementById("spaceName").value = s.name || "";
          document.getElementById("spaceId").value = s.space_id || "";
          document.getElementById("spaceProjectIds").value = (s.project_ids || "").trim();
        }
        spaceModal.show();
      }

      function normalizeProjectIds(v) {
        const s = (v || "").trim().replace(/\s+/g, "");
        if (!s) return null;
        if (!/^(\d+)(,\d+)*$/.test(s)) return "__invalid__";
        return s;
      }

      async function saveSpace() {
        const spk = document.getElementById("spacePk").value;
        const browser_id = parseInt(document.getElementById("spaceBrowserId").value, 10);
        const name = document.getElementById("spaceName").value.trim();
        const space_id = document.getElementById("spaceId").value.trim();
        const project_ids_raw = document.getElementById("spaceProjectIds").value;
        const project_ids = normalizeProjectIds(project_ids_raw);
        if (!name || !space_id) return toast("请填写空间名称与空间ID", "error");
        if (project_ids === "__invalid__") return toast("项目ID格式不正确，请使用如：10,11", "error");
        let r;
        if (!spk) {
          r = await adminFetch("/api/admin/spaces", { method: "POST", body: JSON.stringify({ browser_id, name, space_id, project_ids }) });
        } else {
          r = await adminFetch(`/api/admin/spaces/${spk}`, { method: "PUT", body: JSON.stringify({ name, space_id, project_ids }) });
        }
        if (!r) return;
        const d = await r.json();
        if (!r.ok) return toast(d.detail || "保存失败", "error");
        spaceModal.hide();
        toast("保存成功", "success");
        await loadTree();
      }

      async function deleteSpace(spacePk) {
        if (!confirm("确定删除该空间吗？")) return;
        const r = await adminFetch(`/api/admin/spaces/${spacePk}`, { method: "DELETE" });
        if (!r) return;
        const d = await r.json();
        if (!r.ok) return toast(d.detail || "删除失败", "error");
        toast("已删除", "success");
        await loadTree();
      }

      async function syncSpace(spacePk, fromEl) {
        let btn = fromEl;
        if (!btn) btn = document.querySelector(`button[data-action="sync_space"][data-space_pk="${spacePk}"]`);
        try {
          setBtnBusy(btn, true, { loadingText: "同步中" });
          setSpaceProgress(spacePk, { current: 0, total: 1, text: "正在同步窗口（可能较慢）..." });

          const r = await adminFetch(`/api/admin/spaces/${spacePk}/sync-windows`, { method: "POST" });
          if (!r) return;
          const d = await r.json();
          if (!r.ok) throw new Error(d.detail || "同步失败");

          setSpaceProgress(spacePk, { current: 0, total: 1, text: "同步完成，正在加载窗口列表..." });

          const r2 = await adminFetch(`/api/admin/spaces/${spacePk}/windows`);
          if (!r2) return;
          const d2 = await r2.json();
          if (!r2.ok) throw new Error(d2.detail || "加载窗口列表失败");

          await renderWindowsIncrementally(spacePk, d2.windows || []);

          toast(d.message || "同步完成", "success");
          setSpaceProgress(spacePk, { current: 1, total: 1, text: `完成：${(d2.windows || []).length} 条窗口` });
          window.setTimeout(() => setSpaceProgress(spacePk, { text: "" }), 1500);
        } catch (e) {
          setSpaceProgress(spacePk, { current: 0, total: 1, text: `同步失败：${e.message || "未知错误"}` });
          toast(e.message, "error");
        } finally {
          setBtnBusy(btn, false);
        }
      }

      function expandAll(expand) {
        document.querySelectorAll(".accordion-collapse").forEach(el => {
          const c = bootstrap.Collapse.getOrCreateInstance(el, { toggle: false });
          expand ? c.show() : c.hide();
        });
      }

      // bind top actions
      document.getElementById("btnNewProject").addEventListener("click", () => openProjectModal("new"));
      document.getElementById("btnEditProject").addEventListener("click", () => openProjectModal("edit"));
      document.getElementById("btnDeleteProject").addEventListener("click", deleteProject);
      document.getElementById("btnSaveProject").addEventListener("click", saveProject);

      document.getElementById("btnNewBrowser").addEventListener("click", () => openBrowserModal("new", {}));
      document.getElementById("btnSaveBrowser").addEventListener("click", saveBrowser);

      document.getElementById("btnSaveSpace").addEventListener("click", saveSpace);

      document.getElementById("btnExpandAll").addEventListener("click", () => expandAll(true));
      document.getElementById("btnCollapseAll").addEventListener("click", () => expandAll(false));
      document.getElementById("btnRefreshTree").addEventListener("click", loadTree);
      projectSelect.addEventListener("change", () => {
        if (projectSelect.value) localStorage.setItem(LS_LAST_PROJECT_ID, projectSelect.value);
        loadTree();
      });

      async function init() {
        await loadProjects();
        await loadTree();
      }
      init();
    </script>
  </body>
</html>
