<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>系统配置 - FPBrowser2API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
  </head>
  <body class="bg-light">
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/admin/system">FPBrowser2API</a>
        <div class="navbar-nav me-auto">
          <a class="nav-link" data-nav="system" href="/admin/system">系统配置</a>
          <a class="nav-link" data-nav="projects" href="/admin/projects">项目管理</a>
          <a class="nav-link" data-nav="task_types" href="/admin/task-types">任务类型管理</a>
          <a class="nav-link" data-nav="tasks" href="/admin/tasks">任务列表</a>
          <a class="nav-link" data-nav="tasks_gantt" href="/admin/tasks-gantt">成功失败甘特</a>
          <a class="nav-link" data-nav="test" href="/admin/test">测试</a>
          <a class="nav-link" data-nav="card_keys" href="/admin/card-keys">卡密管理</a>
          <a class="nav-link" data-nav="logs" href="/admin/logs">请求日志</a>
          <a class="nav-link" data-nav="users" href="/admin/users">用户管理</a>
        </div>
        <span class="navbar-text text-light small font-monospace me-3" data-role="navbarClock" title="当前时间"></span>
        <button class="btn btn-outline-light btn-sm" id="btnLogout">退出</button>
      </div>
    </nav>

    <div class="container py-4">
      <div class="row g-4">
        <div class="col-12 col-lg-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title">系统配置</h5>
              <div class="row g-3 mt-1">
                <div class="col-12">
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="proxyEnabled" />
                    <label class="form-check-label" for="proxyEnabled">默认启用代理</label>
                  </div>
                </div>
                <div class="col-12">
                  <label class="form-label">代理地址</label>
                  <input class="form-control mono" id="proxyUrl" placeholder="http://127.0.0.1:7890 或 socks5://127.0.0.1:1080" />
                </div>
                <div class="col-12">
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="debugEnabled" />
                    <label class="form-check-label" for="debugEnabled">启用调试模式</label>
                  </div>
                </div>
                <div class="col-12">
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="logToFile" />
                    <label class="form-check-label" for="logToFile">日志保存到本地文件（fpbrowser2api/app.log）</label>
                  </div>
                </div>
        <div class="col-12">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="stopAcceptingTasks" />
            <label class="form-check-label" for="stopAcceptingTasks">停止接收新任务（维护模式）</label>
          </div>
          <div class="form-text">开启后，对外接口 <span class="mono">POST /v1/tasks</span> 将返回“服务器维护中不接受新任务...”。</div>
        </div>
                <div class="col-12">
                  <button class="btn btn-primary" id="btnSaveSystem">保存系统配置</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-6">
          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <h5 class="card-title">API Key</h5>
              <div class="mb-3">
                <label class="form-label">当前 API Key</label>
                <input class="form-control mono" id="currentApiKey" readonly />
              </div>
              <div class="mb-3">
                <label class="form-label">新 API Key</label>
                <input class="form-control mono" id="newApiKey" placeholder="至少 6 个字符" />
              </div>
              <button class="btn btn-outline-primary" id="btnSaveApiKey">更新 API Key</button>
            </div>
          </div>

          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title">管理员密码修改</h5>
              <div class="mb-3">
                <label class="form-label">管理员用户名（可选修改）</label>
                <input class="form-control" id="adminUsername" />
              </div>
              <div class="mb-3">
                <label class="form-label">旧密码</label>
                <input class="form-control" id="oldPassword" type="password" />
              </div>
              <div class="mb-3">
                <label class="form-label">新密码</label>
                <input class="form-control" id="newPassword" type="password" />
              </div>
              <button class="btn btn-outline-danger" id="btnChangePwd">修改密码（会强制重新登录）</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { adminFetch, toast, setActiveNav, logout, initAdminPage } from "/assets/app.js";

      initAdminPage("system");
      setActiveNav("system");
      document.getElementById("btnLogout").addEventListener("click", logout);

      async function load() {
        const r = await adminFetch("/api/admin/system-config");
        if (!r) return;
        const d = await r.json();
        const c = d.config || {};
        document.getElementById("proxyEnabled").checked = !!c.proxy_enabled;
        document.getElementById("proxyUrl").value = c.proxy_url || "";
        document.getElementById("debugEnabled").checked = !!c.debug_enabled;
        document.getElementById("logToFile").checked = !!c.log_to_file;
        document.getElementById("stopAcceptingTasks").checked = !!c.stop_accepting_tasks;
        document.getElementById("currentApiKey").value = c.api_key || "";
        document.getElementById("adminUsername").value = c.admin_username || "admin";
      }

      document.getElementById("btnSaveSystem").addEventListener("click", async () => {
        try {
          const r = await adminFetch("/api/admin/system-config", {
            method: "POST",
            body: JSON.stringify({
              proxy_enabled: document.getElementById("proxyEnabled").checked,
              proxy_url: document.getElementById("proxyUrl").value,
              debug_enabled: document.getElementById("debugEnabled").checked,
              log_to_file: document.getElementById("logToFile").checked,
              stop_accepting_tasks: document.getElementById("stopAcceptingTasks").checked,
            }),
          });
          if (!r) return;
          const d = await r.json();
          if (!r.ok) throw new Error(d.detail || "保存失败");
          toast(d.message || "保存成功", "success");
          await load();
        } catch (e) {
          toast(e.message, "error");
        }
      });

      document.getElementById("btnSaveApiKey").addEventListener("click", async () => {
        try {
          const key = document.getElementById("newApiKey").value.trim();
          if (key.length < 6) throw new Error("API Key 至少 6 个字符");
          const r = await adminFetch("/api/admin/api-key", { method: "POST", body: JSON.stringify({ api_key: key }) });
          if (!r) return;
          const d = await r.json();
          if (!r.ok) throw new Error(d.detail || "更新失败");
          toast("API Key 已更新", "success");
          document.getElementById("newApiKey").value = "";
          await load();
        } catch (e) {
          toast(e.message, "error");
        }
      });

      document.getElementById("btnChangePwd").addEventListener("click", async () => {
        try {
          const username = document.getElementById("adminUsername").value.trim();
          const oldPwd = document.getElementById("oldPassword").value;
          const newPwd = document.getElementById("newPassword").value;
          if (!oldPwd || !newPwd) throw new Error("请填写旧密码与新密码");
          const r = await adminFetch("/api/admin/change-password", {
            method: "POST",
            body: JSON.stringify({ username, old_password: oldPwd, new_password: newPwd }),
          });
          if (!r) return;
          const d = await r.json();
          if (!r.ok) throw new Error(d.detail || "修改失败");
          toast(d.message || "修改成功", "success");
          setTimeout(() => (window.location.href = "/login"), 800);
        } catch (e) {
          toast(e.message, "error");
        }
      });

      load();
    </script>
  </body>
</html>
