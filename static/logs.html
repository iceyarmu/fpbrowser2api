<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>请求日志 - FPBrowser2API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .small2 { font-size: 12px; }
    </style>
  </head>
  <body class="bg-light">
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/admin/system">FPBrowser2API</a>
        <div class="navbar-nav me-auto">
          <a class="nav-link" data-nav="system" href="/admin/system">系统配置</a>
          <a class="nav-link" data-nav="projects" href="/admin/projects">项目管理</a>
          <a class="nav-link" data-nav="task_types" href="/admin/task-types">任务类型管理</a>
          <a class="nav-link" data-nav="tasks" href="/admin/tasks">任务列表</a>
          <a class="nav-link" data-nav="test" href="/admin/test">测试</a>
          <a class="nav-link" data-nav="logs" href="/admin/logs">请求日志</a>
        </div>
        <button class="btn btn-outline-light btn-sm" id="btnLogout">退出</button>
      </div>
    </nav>

    <div class="container py-4">
      <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
        <div class="fw-semibold">请求日志</div>
        <button class="btn btn-outline-secondary btn-sm" id="btnRefresh">刷新</button>
        <button class="btn btn-outline-danger btn-sm" id="btnClear">清空</button>
        <span class="text-muted small ms-auto">仅记录简化信息（JSON body 64KB 内）。</span>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-sm align-middle">
              <thead>
                <tr class="small2">
                  <th>时间</th>
                  <th>actor</th>
                  <th>method</th>
                  <th>path</th>
                  <th>status</th>
                  <th>耗时(s)</th>
                  <th>请求体</th>
                </tr>
              </thead>
              <tbody id="body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { adminFetch, toast, setActiveNav, logout, escapeHtml } from "/assets/app.js";

      setActiveNav("logs");
      document.getElementById("btnLogout").addEventListener("click", logout);

      async function load() {
        const r = await adminFetch("/api/admin/logs?limit=200");
        if (!r) return;
        const d = await r.json();
        const items = d.logs || [];
        const body = document.getElementById("body");
        if (!items.length) {
          body.innerHTML = `<tr><td colspan="7" class="text-muted small">暂无日志</td></tr>`;
          return;
        }
        body.innerHTML = items.map(x => `
          <tr class="small2">
            <td class="mono">${escapeHtml(x.created_at || "")}</td>
            <td>${escapeHtml(x.actor || "-")}</td>
            <td class="mono">${escapeHtml(x.method || "-")}</td>
            <td class="mono">${escapeHtml(x.path || "-")}</td>
            <td>${x.status_code >= 400 ? `<span class="badge text-bg-danger">${x.status_code}</span>` : `<span class="badge text-bg-success">${x.status_code}</span>`}</td>
            <td class="mono">${Number(x.duration || 0).toFixed(3)}</td>
            <td class="mono" style="max-width: 420px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${escapeHtml(x.request_body || "")}">${escapeHtml(x.request_body || "")}</td>
          </tr>
        `).join("");
      }

      document.getElementById("btnRefresh").addEventListener("click", load);
      document.getElementById("btnClear").addEventListener("click", async () => {
        if (!confirm("确定清空所有日志吗？")) return;
        const r = await adminFetch("/api/admin/logs", { method: "DELETE" });
        if (!r) return;
        const d = await r.json();
        if (!r.ok) return toast(d.detail || "清空失败", "error");
        toast("已清空", "success");
        await load();
      });

      load();
    </script>
  </body>
</html>
