<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>任务类型管理 - FPBrowser2API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .small2 { font-size: 12px; }
      .cell-stack > div { line-height: 1.25; }
      .truncate-1 { max-width: 520px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
  </head>
  <body class="bg-light">
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/admin/system">FPBrowser2API</a>
        <div class="navbar-nav me-auto">
          <a class="nav-link" data-nav="system" href="/admin/system">系统配置</a>
          <a class="nav-link" data-nav="projects" href="/admin/projects">项目管理</a>
          <a class="nav-link" data-nav="task_types" href="/admin/task-types">任务类型管理</a>
          <a class="nav-link" data-nav="test" href="/admin/test">测试</a>
          <a class="nav-link" data-nav="logs" href="/admin/logs">请求日志</a>
        </div>
        <button class="btn btn-outline-light btn-sm" id="btnLogout">退出</button>
      </div>
    </nav>

    <div class="container py-4">
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <div class="d-flex flex-wrap gap-2 align-items-center">
            <div class="fw-semibold">任务类型</div>
            <div class="flex-grow-1" style="min-width: 260px; max-width: 560px;">
              <select class="form-select" id="typeSelect"></select>
              <div class="form-text">英文名称（code）必须唯一；对外接口用 code 作为任务类型参数。</div>
            </div>
            <button class="btn btn-primary ms-auto" id="btnNewType">新增</button>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-12">
          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <div class="d-flex flex-wrap gap-2 align-items-center">
                <h5 class="card-title mb-0">任务类型配置</h5>
                <span class="text-muted small ms-auto" id="currentTypeHint">未选择</span>
              </div>
              <hr />
              <div class="row g-3">
                <input type="hidden" id="typeId" />
                <div class="col-12 col-md-6">
                  <label class="form-label">名称</label>
                  <input class="form-control" id="typeName" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label">英文名称（唯一）</label>
                  <input class="form-control mono" id="typeCode" placeholder="gen_video / gen_image" />
                </div>
                <div class="col-12 col-md-4">
                  <label class="form-label">并发数</label>
                  <input class="form-control" id="typeConcurrency" type="number" min="1" value="1" />
                </div>
                <div class="col-12 col-md-4">
                  <label class="form-label">连续错误阈值</label>
                  <input class="form-control" id="typeErrThr" type="number" min="1" value="3" />
                </div>
                <div class="col-12 col-md-4">
                  <label class="form-label">超时时长（秒）</label>
                  <input class="form-control" id="typeTimeout" type="number" min="10" value="1800" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label">创建任务接口函数</label>
                  <select class="form-select mono" id="typeCreateHandler"></select>
                  <div class="text-muted small">根据 task_type_code 动态分发到对应创建任务函数。</div>
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label">刷新窗口剩余额度接口函数</label>
                  <select class="form-select mono" id="typeQuotaHandler"></select>
                  <div class="text-muted small">点击额度后的刷新按钮会调用此函数。</div>
                </div>
                <div class="col-12">
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="typeEnabled" checked />
                    <label class="form-check-label" for="typeEnabled">启用</label>
                  </div>
                </div>
                <div class="col-12 d-flex gap-2">
                  <button class="btn btn-primary" id="btnSaveType">保存</button>
                  <button class="btn btn-outline-danger" id="btnDeleteType">删除</button>
                </div>
              </div>
            </div>
          </div>

          <div class="card shadow-sm">
            <div class="card-body">
              <div class="d-flex flex-wrap gap-2 align-items-center">
                <h5 class="card-title mb-0">窗口绑定</h5>
                <div class="d-flex flex-wrap gap-2 align-items-center ms-auto">
                  <div class="small text-muted">额度刷新函数</div>
                  <select class="form-select form-select-sm mono" id="quotaHandlerQuick" style="min-width: 260px;"></select>
                  <button class="btn btn-outline-primary btn-sm" id="btnAddWindows">添加窗口</button>
                </div>
              </div>
              <div class="text-muted small mt-1">
                每个窗口可绑定多个任务类型；这里控制额度、并发、冷却与启用状态。
              </div>
              <hr />
              <div class="table-responsive">
                <table class="table table-sm align-middle">
                  <thead>
                    <tr class="small2">
                      <th>窗口</th>
                      <th>空间</th>
                      <th>额度</th>
                      <th>状态</th>
                      <th>启用</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody id="mappingBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Add Windows Modal -->
    <div class="modal fade" id="winModal" tabindex="-1">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">选择窗口</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="row g-2 align-items-end">
              <div class="col-12 col-md-4">
                <label class="form-label">默认额度（remaining_quota）</label>
                <input class="form-control" id="winRemainQuota" type="number" min="0" value="0" />
              </div>
              <div class="col-12 col-md-4">
                <label class="form-label">提示</label>
                <input class="form-control" value="窗口不再单独配置并发（以任务类型并发为准）" disabled />
              </div>
              <div class="col-12 col-md-4">
                <button class="btn btn-primary w-100" id="btnBindWindows">绑定所选窗口</button>
              </div>
            </div>
            <div class="row g-2 mt-2 align-items-center">
              <div class="col-12 col-md-6">
                <input class="form-control" id="winFilter" placeholder="搜索：项目 / 浏览器 / 空间 / 窗口 / 账号 / 代理 / URL" />
              </div>
              <div class="col-12 col-md-6 text-md-end small text-muted">
                已选 <span class="fw-semibold" id="winSelectedCount">0</span> 个
              </div>
            </div>
            <hr />
            <div class="table-responsive">
              <table class="table table-sm align-middle">
                <thead>
                  <tr class="small2">
                    <th><input type="checkbox" id="chkAll" /></th>
                    <th>窗口</th>
                    <th>网址</th>
                    <th>账号 / 代理</th>
                  </tr>
                </thead>
                <tbody id="winBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { adminFetch, toast, setActiveNav, logout, escapeHtml } from "/assets/app.js";

      setActiveNav("task_types");
      document.getElementById("btnLogout").addEventListener("click", logout);

      const winModal = new bootstrap.Modal("#winModal");

      let state = {
        types: [],
        current: null,
        mappings: [],
        windows: [],
        winSelected: new Set(),
        handlers: { create: [], quota: [] },
      };

      async function loadHandlerOptions() {
        const r = await adminFetch("/api/admin/task-type-handler-options");
        if (!r) return;
        const d = await r.json();
        state.handlers.create = d.create_task_handlers || [];
        state.handlers.quota = d.refresh_quota_handlers || [];
        renderHandlerSelects();
      }

      function renderQuotaQuickSelect() {
        const sel = document.getElementById("quotaHandlerQuick");
        const quotaHandlerKey = state.current?.refresh_quota_handler || "";
        const opts = [`<option value="">（默认）noop</option>`].concat(
          (state.handlers.quota || []).map(h => `<option value="${escapeHtml(h.key)}">${escapeHtml(h.key)} - ${escapeHtml(h.label)}</option>`)
        );
        sel.innerHTML = opts.join("");
        sel.value = quotaHandlerKey || "";
        sel.disabled = !document.getElementById("typeId").value;
      }

      function renderHandlerSelects() {
        const selCreate = document.getElementById("typeCreateHandler");
        const selQuota = document.getElementById("typeQuotaHandler");
        const mk = (items, emptyText) => {
          const opts = [`<option value="">${escapeHtml(emptyText)}</option>`]
            .concat((items || []).map(x => `<option value="${escapeHtml(x.key)}">${escapeHtml(x.key)} - ${escapeHtml(x.label)}</option>`));
          return opts.join("");
        };
        selCreate.innerHTML = mk(state.handlers.create, "（默认）default_submit");
        selQuota.innerHTML = mk(state.handlers.quota, "（默认）noop");
        renderQuotaQuickSelect();
      }

      async function loadTypes() {
        const r = await adminFetch("/api/admin/task-types");
        if (!r) return;
        const d = await r.json();
        state.types = d.task_types || [];
        if (state.current?.id) {
          state.current = state.types.find(x => x.id === state.current.id) || state.current;
        }
        renderTypeSelect();
        if (!state.current && state.types[0]) selectType(state.types[0].id);
      }

      function renderTypeSelect() {
        const sel = document.getElementById("typeSelect");
        if (!state.types.length) {
          sel.innerHTML = `<option value="">暂无任务类型（点击右侧“新增”创建）</option>`;
          sel.value = "";
          sel.disabled = true;
          return;
        }
        sel.disabled = false;
        const opts = [`<option value="">（未选择 / 新建）</option>`].concat(
          state.types.map(t => `<option value="${t.id}">${escapeHtml(t.name)} (${escapeHtml(t.code)})</option>`)
        );
        sel.innerHTML = opts.join("");
        sel.value = state.current?.id ? String(state.current.id) : "";
      }

      async function selectType(id) {
        state.current = state.types.find(x => x.id === id) || null;
        fillTypeForm(state.current);
        renderTypeSelect();
        await loadMappings();
      }

      function fillTypeForm(t) {
        document.getElementById("typeId").value = t?.id || "";
        document.getElementById("typeName").value = t?.name || "";
        document.getElementById("typeCode").value = t?.code || "";
        document.getElementById("typeConcurrency").value = t?.concurrency ?? 1;
        document.getElementById("typeErrThr").value = t?.continuous_error_threshold ?? 3;
        document.getElementById("typeTimeout").value = t?.timeout_seconds ?? 1800;
        document.getElementById("typeCreateHandler").value = t?.create_task_handler || "";
        document.getElementById("typeQuotaHandler").value = t?.refresh_quota_handler || "";
        document.getElementById("typeEnabled").checked = t ? !!t.enabled : true;
        // 允许编辑英文名称（code）；注意这会影响对外接口 task_type_code
        document.getElementById("typeCode").disabled = false;
        document.getElementById("currentTypeHint").textContent = t ? `当前：${t.name} (${t.code})` : "未选择";
        renderQuotaQuickSelect();
      }

      async function saveType() {
        try {
          const id = document.getElementById("typeId").value;
          const oldCode = state.current?.code || "";
          const payload = {
            name: document.getElementById("typeName").value.trim(),
            code: document.getElementById("typeCode").value.trim(),
            concurrency: parseInt(document.getElementById("typeConcurrency").value, 10) || 1,
            continuous_error_threshold: parseInt(document.getElementById("typeErrThr").value, 10) || 3,
            timeout_seconds: parseInt(document.getElementById("typeTimeout").value, 10) || 1800,
            create_task_handler: document.getElementById("typeCreateHandler").value || null,
            refresh_quota_handler: document.getElementById("typeQuotaHandler").value || null,
            enabled: document.getElementById("typeEnabled").checked,
          };
          if (!payload.name || !payload.code) throw new Error("请填写名称与英文名称");
          if (id && oldCode && payload.code !== oldCode) {
            const ok = confirm("你正在修改英文名称（code）。这会影响对外接口 task_type_code，并会同步更新历史任务记录的 task_type_code。确定继续吗？");
            if (!ok) return;
          }
          let r;
          if (!id) {
            r = await adminFetch("/api/admin/task-types", { method: "POST", body: JSON.stringify(payload) });
          } else {
            r = await adminFetch(`/api/admin/task-types/${id}`, { method: "PUT", body: JSON.stringify(payload) });
          }
          if (!r) return;
          const d = await r.json();
          if (!r.ok) throw new Error(d.detail || "保存失败");
          toast("保存成功", "success");
          await loadTypes();
          if (!id && d.task_type_id) selectType(d.task_type_id);
          if (id) selectType(parseInt(id, 10));
        } catch (e) {
          toast(e.message, "error");
        }
      }

      async function deleteType() {
        const id = document.getElementById("typeId").value;
        if (!id) return;
        if (!confirm("确定删除该任务类型吗？")) return;
        const r = await adminFetch(`/api/admin/task-types/${id}`, { method: "DELETE" });
        if (!r) return;
        const d = await r.json();
        if (!r.ok) return toast(d.detail || "删除失败", "error");
        toast("已删除", "success");
        state.current = null;
        await loadTypes();
        fillTypeForm(null);
        document.getElementById("mappingBody").innerHTML = "";
      }

      async function loadMappings() {
        const id = document.getElementById("typeId").value;
        if (!id) {
          document.getElementById("mappingBody").innerHTML = `<tr><td colspan="6" class="text-muted small">请先选择任务类型</td></tr>`;
          return;
        }
        const r = await adminFetch(`/api/admin/task-types/${id}/windows`);
        if (!r) return;
        const d = await r.json();
        state.mappings = d.items || [];
        renderMappings();
      }

      function renderMappings() {
        const body = document.getElementById("mappingBody");
        if (!state.mappings.length) {
          body.innerHTML = `<tr><td colspan="6" class="text-muted small">暂无绑定窗口</td></tr>`;
          return;
        }
        renderQuotaQuickSelect();
        body.innerHTML = state.mappings.map(m => `
          <tr class="small2">
            <td>
              <div class="fw-semibold">${escapeHtml(m.window_name || "-")}</div>
              <div class="text-muted truncate-1">${escapeHtml(m.browser_name || "-")}</div>
            </td>
            <td>
              <div class="mono">${escapeHtml(m.space_id || "-")}</div>
              <div class="text-muted">${escapeHtml(m.space_name || "-")}</div>
            </td>
            <td class="mono">
              <div class="d-flex flex-wrap gap-2 align-items-center">
                <div class="fw-semibold">${m.remaining_quota}</div>
                <button class="btn btn-outline-secondary btn-sm" title="刷新剩余额度" data-act="refreshQuota" data-mid="${m.id}">⟳</button>
              </div>
            </td>
            <td class="mono cell-stack">
              <div>错误：<span class="fw-semibold">${m.consecutive_errors}</span>/${m.total_errors}</div>
              <div>冷却：${escapeHtml(m.cooldown_until || "-")}</div>
            </td>
            <td>${m.enabled ? `<span class="badge text-bg-success">是</span>` : `<span class="badge text-bg-secondary">否</span>`}</td>
            <td>
              <button class="btn btn-outline-secondary btn-sm" data-act="edit" data-mid="${m.id}">编辑</button>
              <button class="btn btn-outline-danger btn-sm" data-act="del" data-mid="${m.id}">删除</button>
            </td>
          </tr>
        `).join("");
        body.querySelectorAll("[data-act]").forEach(btn => {
          const act = btn.dataset.act;
          const mid = parseInt(btn.dataset.mid, 10);
          btn.addEventListener("click", () => openMappingEditor(mid, act));
        });
      }

      async function quickUpdateQuotaHandler(newKey) {
        try {
          const id = document.getElementById("typeId").value;
          if (!id) return;
          // 同步到表单（保持一致）
          document.getElementById("typeQuotaHandler").value = newKey || "";
          document.getElementById("quotaHandlerQuick").value = newKey || "";
          // 直接 PUT 更新（复用当前表单值，避免丢字段）
          const payload = {
            name: document.getElementById("typeName").value.trim(),
            code: document.getElementById("typeCode").value.trim(),
            concurrency: parseInt(document.getElementById("typeConcurrency").value, 10) || 1,
            continuous_error_threshold: parseInt(document.getElementById("typeErrThr").value, 10) || 3,
            timeout_seconds: parseInt(document.getElementById("typeTimeout").value, 10) || 1800,
            create_task_handler: document.getElementById("typeCreateHandler").value || null,
            refresh_quota_handler: document.getElementById("typeQuotaHandler").value || null,
            enabled: document.getElementById("typeEnabled").checked,
          };
          const r = await adminFetch(`/api/admin/task-types/${id}`, { method: "PUT", body: JSON.stringify(payload) });
          if (!r) return;
          const d = await r.json();
          if (!r.ok) throw new Error(d.detail || "更新失败");
          toast("已更新额度刷新函数", "success");
          await loadTypes();
          await selectType(parseInt(id, 10));
        } catch (e) {
          toast(e.message, "error");
        }
      }

      async function openMappingEditor(mappingId, act) {
        if (act === "refreshQuota") {
          return refreshQuota(mappingId);
        }
        const m = state.mappings.find(x => x.id === mappingId);
        if (!m) return;
        if (act === "del") {
          if (!confirm("确定删除该绑定吗？")) return;
          const r = await adminFetch(`/api/admin/task-type-windows/${mappingId}`, { method: "PATCH", body: JSON.stringify({ deleted: true }) });
          if (!r) return;
          const d = await r.json();
          if (!r.ok) return toast(d.detail || "删除失败", "error");
          toast("已删除", "success");
          await loadMappings();
          return;
        }
        // 简单 prompt 编辑（不做复杂弹窗）
        const remain = prompt("剩余额度 remaining_quota：", String(m.remaining_quota));
        if (remain === null) return;
        const enabled = confirm("是否启用该绑定？（确定=启用，取消=禁用）");
        const cooldown = prompt("冷却到 cooldown_until（ISO，留空清除）：", m.cooldown_until || "");
        const r = await adminFetch(`/api/admin/task-type-windows/${mappingId}`, {
          method: "PATCH",
          body: JSON.stringify({
            remaining_quota: parseInt(remain, 10),
            enabled,
            cooldown_until: cooldown || "",
          }),
        });
        if (!r) return;
        const d = await r.json();
        if (!r.ok) return toast(d.detail || "更新失败", "error");
        toast("已更新", "success");
        await loadMappings();
      }

      async function openWinModal() {
        const id = document.getElementById("typeId").value;
        if (!id) return toast("请先选择任务类型", "error");
        const r = await adminFetch("/api/admin/windows/all");
        if (!r) return;
        const d = await r.json();
        state.windows = d.windows || [];
        state.winSelected = new Set();
        document.getElementById("winFilter").value = "";
        renderWinList();
        winModal.show();
      }

      function renderWinList() {
        const body = document.getElementById("winBody");
        const q = (document.getElementById("winFilter")?.value || "").trim().toLowerCase();
        const items = !q ? state.windows : state.windows.filter(w => {
          const hay = [
            w.project_name, w.browser_name, w.space_id, w.space_name, w.window_name,
            w.platform_account, w.platform_url, w.proxy_addr,
          ].filter(Boolean).join(" ").toLowerCase();
          return hay.includes(q);
        });

        document.getElementById("winSelectedCount").textContent = String(state.winSelected.size || 0);

        if (!items.length) {
          body.innerHTML = `<tr><td colspan="4" class="text-muted small">${state.windows.length ? "无匹配结果，请调整搜索条件。" : "暂无窗口数据，请先在“项目管理”里同步窗口。"}</td></tr>`;
          document.getElementById("chkAll").checked = false;
          return;
        }
        body.innerHTML = items.map(w => `
          <tr class="small2">
            <td><input type="checkbox" class="chkWin" value="${w.window_pk}" ${state.winSelected.has(w.window_pk) ? "checked" : ""} /></td>
            <td class="cell-stack">
              <div class="fw-semibold">${escapeHtml(w.window_name || "-")}</div>
              <div class="text-muted">${escapeHtml(w.project_name || "-")} / ${escapeHtml(w.browser_name || "-")}</div>
              <div class="mono text-muted">${escapeHtml(w.space_id || "-")} <span class="text-muted">·</span> ${escapeHtml(w.space_name || "-")}</div>
            </td>
            <td class="mono">
              <div class="truncate-1">
                ${w.platform_url ? `<a target="_blank" href="${escapeHtml(w.platform_url)}">${escapeHtml(w.platform_url)}</a>` : "-"}
              </div>
            </td>
            <td class="cell-stack">
              <div>${escapeHtml(w.platform_account || "-")}</div>
              <div class="mono text-muted">${escapeHtml(w.proxy_addr || "-")}</div>
            </td>
          </tr>
        `).join("");

        // 绑定勾选事件，保持筛选/滚动时选中状态不丢失
        body.querySelectorAll(".chkWin").forEach(chk => {
          chk.addEventListener("change", (e) => {
            const pk = parseInt(e.target.value, 10);
            if (e.target.checked) state.winSelected.add(pk);
            else state.winSelected.delete(pk);
            document.getElementById("winSelectedCount").textContent = String(state.winSelected.size || 0);
            const boxes = Array.from(body.querySelectorAll(".chkWin"));
            document.getElementById("chkAll").checked = boxes.length > 0 && boxes.every(x => x.checked);
          });
        });
        const boxes = Array.from(body.querySelectorAll(".chkWin"));
        document.getElementById("chkAll").checked = boxes.length > 0 && boxes.every(x => x.checked);
      }

      async function bindWindows() {
        try {
          const typeId = document.getElementById("typeId").value;
          const ids = Array.from(state.winSelected || []).map(x => parseInt(x, 10)).filter(x => !Number.isNaN(x));
          if (!ids.length) throw new Error("请至少选择一个窗口");
          const payload = {
            window_pks: ids,
            daily_quota: 0,
            remaining_quota: parseInt(document.getElementById("winRemainQuota").value, 10) || 0,
            enabled: true,
          };
          const r = await adminFetch(`/api/admin/task-types/${typeId}/windows`, { method: "POST", body: JSON.stringify(payload) });
          if (!r) return;
          const d = await r.json();
          if (!r.ok) throw new Error(d.detail || "绑定失败");
          toast(`已绑定 ${d.affected || ids.length} 个窗口`, "success");
          winModal.hide();
          await loadMappings();
        } catch (e) {
          toast(e.message, "error");
        }
      }

      document.getElementById("btnLogout").addEventListener("click", logout);
      document.getElementById("btnNewType").addEventListener("click", () => {
        state.current = null;
        fillTypeForm(null);
        renderTypeSelect();
        document.getElementById("typeSelect").value = "";
        document.getElementById("mappingBody").innerHTML = `<tr><td colspan="6" class="text-muted small">请先保存任务类型</td></tr>`;
      });
      document.getElementById("btnSaveType").addEventListener("click", saveType);
      document.getElementById("btnDeleteType").addEventListener("click", deleteType);
      document.getElementById("btnAddWindows").addEventListener("click", openWinModal);
      document.getElementById("btnBindWindows").addEventListener("click", bindWindows);
      document.getElementById("quotaHandlerQuick").addEventListener("change", (e) => quickUpdateQuotaHandler(e.target.value || ""));
      document.getElementById("typeSelect").addEventListener("change", (e) => {
        const v = e.target.value;
        if (!v) {
          state.current = null;
          fillTypeForm(null);
          document.getElementById("mappingBody").innerHTML = `<tr><td colspan="6" class="text-muted small">请选择一个任务类型，或点击上方“新增”创建</td></tr>`;
          return;
        }
        selectType(parseInt(v, 10));
      });
      document.getElementById("winFilter").addEventListener("input", () => renderWinList());
      document.getElementById("chkAll").addEventListener("change", (e) => {
        const checked = e.target.checked;
        document.querySelectorAll("#winBody .chkWin").forEach(chk => {
          chk.checked = checked;
          const pk = parseInt(chk.value, 10);
          if (checked) state.winSelected.add(pk);
          else state.winSelected.delete(pk);
        });
        document.getElementById("winSelectedCount").textContent = String(state.winSelected.size || 0);
      });

      async function refreshQuota(mappingId) {
        try {
          const r = await adminFetch(`/api/admin/task-type-windows/${mappingId}/refresh-remaining-quota`, { method: "POST" });
          if (!r) return;
          const d = await r.json();
          if (!r.ok) throw new Error(d.detail || "刷新失败");
          toast(`已刷新：remaining_quota=${d.remaining_quota}`, "success");
          await loadMappings();
        } catch (e) {
          toast(e.message, "error");
        }
      }

      loadHandlerOptions().then(loadTypes);
    </script>
  </body>
</html>
