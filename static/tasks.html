<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>任务列表 - FPBrowser2API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .small2 { font-size: 12px; }
      .truncate-1 { max-width: 520px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .truncate-err { max-width: 520px; }
      .window-acc { max-width: 360px; }
    </style>
  </head>
  <body class="bg-light">
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/admin/system">FPBrowser2API</a>
        <div class="navbar-nav me-auto">
          <a class="nav-link" data-nav="system" href="/admin/system">系统配置</a>
          <a class="nav-link" data-nav="projects" href="/admin/projects">项目管理</a>
          <a class="nav-link" data-nav="task_types" href="/admin/task-types">任务类型管理</a>
          <a class="nav-link" data-nav="tasks" href="/admin/tasks">任务列表</a>
          <a class="nav-link" data-nav="test" href="/admin/test">测试</a>
          <a class="nav-link" data-nav="logs" href="/admin/logs">请求日志</a>
        </div>
        <button class="btn btn-outline-light btn-sm" id="btnLogout">退出</button>
      </div>
    </nav>

    <div class="container-fluid py-4">
      <div class="card shadow-sm mb-3">
        <div class="card-body">
          <div class="row g-2 align-items-end">
            <div class="col-12 col-md-3">
              <label class="form-label">任务类型</label>
              <select class="form-select" id="fltType"></select>
            </div>
            <div class="col-12 col-md-2">
              <label class="form-label">状态</label>
              <select class="form-select" id="fltStatus">
                <option value="">（全部）</option>
                <option value="queued">queued</option>
                <option value="running">running</option>
                <option value="completed">completed</option>
                <option value="failed">failed</option>
              </select>
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">关键字</label>
              <input class="form-control" id="fltQ" placeholder="task_id / prompt / error_message" />
            </div>
            <div class="col-6 col-md-1">
              <label class="form-label">每页</label>
              <select class="form-select" id="fltLimit">
                <option value="20">20</option>
                <option value="50" selected>50</option>
                <option value="100">100</option>
                <option value="200">200</option>
              </select>
            </div>
            <div class="col-6 col-md-2 d-flex gap-2">
              <button class="btn btn-outline-secondary w-100" id="btnReset">重置</button>
              <button class="btn btn-primary w-100" id="btnRefresh">刷新</button>
            </div>
          </div>
          <div class="d-flex flex-wrap gap-2 align-items-center mt-2">
            <div class="text-muted small">
              共 <span class="fw-semibold" id="hintTotal">0</span> 条
              <span class="text-muted">·</span>
              当前第 <span class="fw-semibold" id="hintPage">1</span> 页
            </div>
            <div class="ms-auto d-flex gap-2">
              <button class="btn btn-outline-secondary btn-sm" id="btnPrev">上一页</button>
              <button class="btn btn-outline-secondary btn-sm" id="btnNext">下一页</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-sm align-middle" style="min-width: 1280px;">
              <thead>
                <tr class="small2">
                  <th style="min-width: 120px;">task_id</th>
                  <th style="min-width: 120px;">任务类型</th>
                  <th style="min-width: 120px;">状态</th>
                  <th style="min-width: 160px;">窗口信息</th>
                  <th style="min-width: 160px;">错误信息</th>
                  <th style="min-width: 160px;">result_json</th>
                  <th style="min-width: 160px;">创建时间</th>
                </tr>
              </thead>
              <tbody id="body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Result JSON Modal -->
    <div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title mono" id="resultModalTitle">result_json</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <pre class="mono small2 mb-0" id="resultModalBody" style="white-space: pre-wrap; word-break: break-word;"></pre>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">关闭</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Error List Modal -->
    <div class="modal fade" id="errorModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title mono" id="errorModalTitle">错误列表</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="errorModalBody"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">关闭</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { adminFetch, toast, setActiveNav, logout, escapeHtml } from "/assets/app.js";

      setActiveNav("tasks");
      document.getElementById("btnLogout").addEventListener("click", logout);

      const state = {
        limit: 50,
        offset: 0,
        total: 0,
        items: [],
        typeMap: new Map(), // code -> name
      };

      function badgeForStatus(s) {
        const v = String(s || "").toLowerCase();
        if (v === "completed") return `<span class="badge text-bg-success">completed</span>`;
        if (v === "failed") return `<span class="badge text-bg-danger">failed</span>`;
        if (v === "running") return `<span class="badge text-bg-primary">running</span>`;
        if (v === "queued") return `<span class="badge text-bg-secondary">queued</span>`;
        return `<span class="badge text-bg-light text-dark">${escapeHtml(v || "-")}</span>`;
      }

      function getResultText(item) {
        const rj = item?.result_json;
        if (typeof rj === "string" && rj.trim()) return rj;
        const r = item?.result;
        if (r && typeof r === "object") {
          try { return JSON.stringify(r); } catch (_) { return ""; }
        }
        return "";
      }

      const resultModalEl = document.getElementById("resultModal");
      const resultModal = resultModalEl ? new bootstrap.Modal(resultModalEl) : null;
      const resultModalTitle = document.getElementById("resultModalTitle");
      const resultModalBody = document.getElementById("resultModalBody");

      const errorModalEl = document.getElementById("errorModal");
      const errorModal = errorModalEl ? new bootstrap.Modal(errorModalEl) : null;
      const errorModalTitle = document.getElementById("errorModalTitle");
      const errorModalBody = document.getElementById("errorModalBody");

      function openResultModal(taskId) {
        if (!resultModal) return;
        const item = state.items.find(x => String(x.task_id || "") === String(taskId || ""));
        const raw = item ? getResultText(item) : "";
        let pretty = raw || "-";
        if (raw) {
          try {
            const obj = JSON.parse(raw);
            pretty = JSON.stringify(obj, null, 2);
          } catch (_) {
            // keep raw
          }
        }
        resultModalTitle.textContent = `result_json · ${String(taskId || "")}`;
        resultModalBody.textContent = pretty;
        resultModal.show();
      }

      async function openErrorModalByTaskId(taskId) {
        if (!errorModal) return;
        const item = state.items.find(x => String(x.task_id || "") === String(taskId || ""));
        const windowPk = item?.window_pk;
        const windowAccount = item?.window_account || "-";
        if (windowPk === null || windowPk === undefined || windowPk === "") {
          toast("该任务未绑定窗口，无法查询错误列表", "error");
          return;
        }
        await openErrorModal(Number(windowPk), String(windowAccount));
      }

      async function openErrorModal(windowPk, windowAccount) {
        if (!errorModal) return;
        errorModalTitle.textContent = `错误列表 · ${windowAccount || "-"} · window_pk=${String(windowPk)}`;
        errorModalBody.innerHTML = `<div class="text-muted small">加载中...</div>`;
        errorModal.show();

        try {
          const params = new URLSearchParams();
          params.set("limit", "200");
          params.set("offset", "0");
          params.set("window_pk", String(windowPk));

          const r = await adminFetch(`/api/admin/tasks?${params.toString()}`);
          if (!r) return;
          const d = await r.json();
          if (!r.ok) throw new Error(d.detail || "加载错误列表失败");

          const items = (d.items || []).filter(x => String(x.error_message || "").trim());
          if (!items.length) {
            errorModalBody.innerHTML = `<div class="text-muted small">暂无错误</div>`;
            return;
          }

          errorModalBody.innerHTML = `
            <div class="list-group">
              ${items.map(x => {
                const code = x.task_type_code || "-";
                const typeName = state.typeMap.get(String(code)) || String(code);
                const err = String(x.error_message || "").trim();
                return `
                  <div class="list-group-item">
                    <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
                      <span class="mono">${escapeHtml(x.created_at || "")}</span>
                      <span class="text-muted">·</span>
                      <span class="mono">${escapeHtml(x.task_id || "")}</span>
                      <span class="text-muted">·</span>
                      <span>${escapeHtml(typeName)} <span class="text-muted mono">(${escapeHtml(code)})</span></span>
                      <span class="ms-auto">${badgeForStatus(x.status)}</span>
                    </div>
                    <pre class="mono small2 mb-0" style="white-space: pre-wrap; word-break: break-word;">${escapeHtml(err)}</pre>
                  </div>
                `;
              }).join("")}
            </div>
          `;
        } catch (e) {
          errorModalBody.innerHTML = `<div class="text-danger small">${escapeHtml(e.message || "加载错误列表失败")}</div>`;
        }
      }

      function currentFilters() {
        return {
          task_type_code: document.getElementById("fltType").value || "",
          status: document.getElementById("fltStatus").value || "",
          q: (document.getElementById("fltQ").value || "").trim(),
          limit: parseInt(document.getElementById("fltLimit").value, 10) || 50,
        };
      }

      async function loadTaskTypes() {
        const r = await adminFetch("/api/admin/task-types");
        if (!r) return;
        const d = await r.json();
        const items = d.task_types || [];

        state.typeMap = new Map(items.map(x => [String(x.code || ""), String(x.name || x.code || "")]));

        const sel = document.getElementById("fltType");
        sel.innerHTML = [`<option value="">（全部）</option>`].concat(
          items.map(t => `<option value="${escapeHtml(t.code)}">${escapeHtml(t.name)} (${escapeHtml(t.code)})</option>`)
        ).join("");
      }

      function render() {
        const body = document.getElementById("body");
        const total = Number(state.total || 0);
        const limit = Number(state.limit || 50);
        const offset = Number(state.offset || 0);
        const page = Math.floor(offset / limit) + 1;
        const maxPage = Math.max(1, Math.ceil(total / limit) || 1);

        document.getElementById("hintTotal").textContent = String(total);
        document.getElementById("hintPage").textContent = `${page}/${maxPage}`;

        document.getElementById("btnPrev").disabled = offset <= 0;
        document.getElementById("btnNext").disabled = (offset + limit) >= total;

        if (!state.items.length) {
          body.innerHTML = `<tr><td colspan="7" class="text-muted small">暂无任务</td></tr>`;
          return;
        }

        body.innerHTML = state.items.map(x => {
          const code = x.task_type_code || "-";
          const typeName = state.typeMap.get(String(code)) || String(code);
          const err = x.error_message || "";
          const accRaw = String(x.window_account ?? "").trim();
          const acc = accRaw || "-";
          const sortNum = (x && (x.windowSortNum ?? x.window_sort_num ?? x.window_sortNum)) ?? "";
          const sortNumText = String(sortNum ?? "").trim();
          const windowInfo = sortNumText ? (accRaw ? `${sortNumText}-${accRaw}` : sortNumText) : acc;
          const errCell = (String(err || "").trim())
            ? `<button class="btn btn-link p-0 text-danger mono truncate-1 truncate-err text-start" style="max-width: 520px;" data-action="view-errors" data-task-id="${escapeHtml(x.task_id || "")}" title="点击查看该窗口全部错误">${escapeHtml(err)}</button>`
            : `<span class="text-muted">-</span>`;
          return `
            <tr class="small2">
              <td class="mono">${escapeHtml(x.task_id || "")}</td>
              <td>${escapeHtml(typeName)} <span class="text-muted mono">(${escapeHtml(code)})</span></td>
              <td>${badgeForStatus(x.status)}</td>
              <td class="mono">
                <div class="d-flex align-items-center gap-2">
                  <div class="mono truncate-1 window-acc flex-grow-1" title="${escapeHtml(windowInfo)}">${escapeHtml(windowInfo)}</div>
                </div>
              </td>
              <td class="mono truncate-1 truncate-err" title="${escapeHtml(err)}">${errCell}</td>
              <td class="mono">
                <button class="btn btn-outline-secondary btn-sm py-0" data-action="view-result" data-task-id="${escapeHtml(x.task_id || "")}">查看</button>
              </td>
              <td class="mono">${escapeHtml(x.created_at || "")}</td>
            </tr>
          `;
        }).join("");
      }

      async function load() {
        try {
          const f = currentFilters();
          state.limit = f.limit;

          const params = new URLSearchParams();
          params.set("limit", String(state.limit));
          params.set("offset", String(state.offset));
          if (f.task_type_code) params.set("task_type_code", f.task_type_code);
          if (f.status) params.set("status", f.status);
          if (f.q) params.set("q", f.q);

          const r = await adminFetch(`/api/admin/tasks?${params.toString()}`);
          if (!r) return;
          const d = await r.json();
          if (!r.ok) throw new Error(d.detail || "加载失败");

          state.total = Number(d.total || 0);
          state.items = d.items || [];
          render();
        } catch (e) {
          toast(e.message, "error");
        }
      }

      function resetFilters() {
        document.getElementById("fltType").value = "";
        document.getElementById("fltStatus").value = "";
        document.getElementById("fltQ").value = "";
        document.getElementById("fltLimit").value = "50";
        state.offset = 0;
      }

      document.getElementById("btnRefresh").addEventListener("click", () => load());
      document.getElementById("btnReset").addEventListener("click", async () => {
        resetFilters();
        await load();
      });

      document.getElementById("body").addEventListener("click", (e) => {
        const elResult = e.target?.closest?.("[data-action='view-result']");
        if (elResult) {
          const taskId = elResult.getAttribute("data-task-id");
          openResultModal(taskId);
          return;
        }
        const elErr = e.target?.closest?.("[data-action='view-errors']");
        if (elErr) {
          const taskId = elErr.getAttribute("data-task-id");
          openErrorModalByTaskId(taskId);
        }
      });

      document.getElementById("btnPrev").addEventListener("click", async () => {
        state.offset = Math.max(0, state.offset - state.limit);
        await load();
      });
      document.getElementById("btnNext").addEventListener("click", async () => {
        state.offset = state.offset + state.limit;
        await load();
      });

      ["fltType", "fltStatus", "fltLimit"].forEach(id => {
        document.getElementById(id).addEventListener("change", async () => {
          state.offset = 0;
          await load();
        });
      });
      document.getElementById("fltQ").addEventListener("keydown", async (e) => {
        if (e.key === "Enter") {
          state.offset = 0;
          await load();
        }
      });

      await loadTaskTypes();
      await load();
    </script>
  </body>
</html>
