<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>测试 - FPBrowser2API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
  </head>
  <body class="bg-light">
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/admin/system">FPBrowser2API</a>
        <div class="navbar-nav me-auto">
          <a class="nav-link" data-nav="system" href="/admin/system">系统配置</a>
          <a class="nav-link" data-nav="projects" href="/admin/projects">项目管理</a>
          <a class="nav-link" data-nav="task_types" href="/admin/task-types">任务类型管理</a>
          <a class="nav-link" data-nav="tasks" href="/admin/tasks">任务列表</a>
          <a class="nav-link" data-nav="test" href="/admin/test">测试</a>
          <a class="nav-link" data-nav="logs" href="/admin/logs">请求日志</a>
        </div>
        <button class="btn btn-outline-light btn-sm" id="btnLogout">退出</button>
      </div>
    </nav>

    <div class="container py-4">
      <div class="row g-4">
        <div class="col-12 col-lg-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title">发起测试任务</h5>
              <div class="mb-3">
                <label class="form-label">任务类型</label>
                <select class="form-select" id="taskType"></select>
              </div>
              <div class="mb-3">
                <label class="form-label">文本内容</label>
                <textarea class="form-control" id="prompt" rows="5" placeholder="输入文本提示词"></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label">首帧图片链接 first_image_url（可选）</label>
                <input class="form-control mono" id="firstImageUrl" placeholder="https://..." />
                <div class="text-muted small">后端不再接收图片二进制，只接收网络链接（由 handler 自行处理）。</div>
              </div>
              <div class="mb-3">
                <label class="form-label">时长 duration（可选）</label>
                <input class="form-control mono" id="duration" placeholder="5" />
              </div>
              <button class="btn btn-primary" id="btnSubmit">提交任务</button>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title">任务进度</h5>
              <div class="mb-2">
                <div class="text-muted small">task_id</div>
                <div class="input-group">
                  <input class="form-control mono" id="taskIdInput" placeholder="输入 task_id 后点击查询" />
                  <button class="btn btn-outline-secondary" id="btnQuery">查询</button>
                </div>
                <div class="text-muted small mt-1">可手动输入任意 task_id 单次查询（不会自动提交任务）。</div>
              </div>
              <div class="mb-3">
                <div class="progress" role="progressbar">
                  <div class="progress-bar" id="bar" style="width: 0%">0%</div>
                </div>
              </div>
              <div class="mb-3">
                <div class="text-muted small">状态</div>
                <div id="status">-</div>
              </div>
              <div class="mb-3">
                <div class="text-muted small">结果</div>
                <pre class="bg-light border rounded p-2 small" id="result" style="min-height: 160px; white-space: pre-wrap;"></pre>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { adminFetch, toast, setActiveNav, logout, escapeHtml } from "/assets/app.js";

      setActiveNav("test");
      document.getElementById("btnLogout").addEventListener("click", logout);

      // ---- 本地缓存（localStorage）----
      const LS_PREFIX = "fpbrowser2api.admin.";
      const LS_KEYS = {
        testTaskType: `${LS_PREFIX}test.task_type_code`,
        testPrompt: `${LS_PREFIX}test.prompt`,
        testLastTaskId: `${LS_PREFIX}test.last_task_id`,
      };
      function lsGet(key) {
        try { return localStorage.getItem(key); } catch { return null; }
      }
      function lsSet(key, val) {
        try { localStorage.setItem(key, val ?? ""); } catch {}
      }
      function lsDel(key) {
        try { localStorage.removeItem(key); } catch {}
      }

      let apiKey = null;
      let pollTimer = null;
      let autoPollEnabled = true; // 提交任务默认自动轮询；手动“查询”则视为单次查询

      async function loadApiKey() {
        const r = await adminFetch("/api/admin/system-config");
        if (!r) return;
        const d = await r.json();
        apiKey = d.config?.api_key || null;
      }

      async function loadTaskTypes() {
        if (!apiKey) return;
        const r = await fetch("/v1/task-types", { headers: { Authorization: `Bearer ${apiKey}` } });
        const d = await r.json();
        const items = d.task_types || [];
        const sel = document.getElementById("taskType");
        sel.innerHTML = items.map(t => `<option value="${escapeHtml(t.code)}">${escapeHtml(t.name)} (${escapeHtml(t.code)})</option>`).join("");

        // 任务类型回填（需等 options 渲染完成）
        const saved = lsGet(LS_KEYS.testTaskType);
        if (saved && Array.from(sel.options).some(o => o.value === saved)) {
          sel.value = saved;
        }
      }

      function setProgress(pct) {
        const bar = document.getElementById("bar");
        const v = Math.max(0, Math.min(100, pct || 0));
        bar.style.width = `${v}%`;
        bar.textContent = `${v}%`;
      }

      function renderTaskSnapshot(taskId, d) {
        const input = document.getElementById("taskIdInput");
        if (input) input.value = taskId || "";
        document.getElementById("status").textContent = d?.status ?? "-";
        setProgress(d?.progress || 0);
        document.getElementById("result").textContent = d ? JSON.stringify(d, null, 2) : "";
      }

      async function fetchAndRenderTask(taskId, { silent = true } = {}) {
        if (!apiKey) return null;
        if (!taskId) return null;
        try {
          const r = await fetch(`/v1/tasks/${encodeURIComponent(taskId)}`, { headers: { Authorization: `Bearer ${apiKey}` } });
          const d = await r.json();
          if (!r.ok) throw new Error(d.detail || "查询失败");
          renderTaskSnapshot(taskId, d);
          return d;
        } catch (e) {
          if (!silent) toast(e.message, "error");
          // 如果 task_id 无效/被删除，避免每次切回页面都报错刷屏
          renderTaskSnapshot(taskId, { status: "unknown", progress: 0, error: e.message });
          return null;
        }
      }

      async function submit() {
        try {
          if (!apiKey) throw new Error("API Key 未加载");
          const type = document.getElementById("taskType").value;
          const prompt = document.getElementById("prompt").value.trim();
          const firstImageUrl = document.getElementById("firstImageUrl").value.trim();
          const durationRaw = document.getElementById("duration").value.trim();
          const duration = durationRaw ? Number(durationRaw) : undefined;
          if (!type) throw new Error("请选择任务类型");
          // 注意：不同 task handler 可能需要不同字段，这里仅示例常用字段
          const payload = { prompt };
          if (firstImageUrl) payload.first_image_url = firstImageUrl;
          if (duration !== undefined && !Number.isNaN(duration)) payload.duration = duration;

          const r = await fetch("/v1/tasks", {
            method: "POST",
            headers: { Authorization: `Bearer ${apiKey}`, "Content-Type": "application/json" },
            body: JSON.stringify({ task_type_code: type, json: payload }),
          });
          const d = await r.json();
          if (!r.ok) throw new Error(d.detail || "提交失败");
          toast("提交成功", "success");
          const input = document.getElementById("taskIdInput");
          if (input) input.value = d.task_id;
          document.getElementById("status").textContent = "queued";
          document.getElementById("result").textContent = "";
          setProgress(0);
          lsSet(LS_KEYS.testLastTaskId, d.task_id);
          autoPollEnabled = true;
          startPoll(d.task_id);
        } catch (e) {
          toast(e.message, "error");
        }
      }

      function stopPoll() {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = null;
      }

      function startPoll(taskId) {
        stopPoll();
        pollTimer = setInterval(async () => {
          try {
            const d = await fetchAndRenderTask(taskId, { silent: true });
            if (!d) return;
            if (d.status === "completed" || d.status === "failed") {
              stopPoll();
            }
          } catch (e) {
            // 不打断轮询，避免偶发网络抖动
          }
        }, 2000);
      }

      document.getElementById("btnSubmit").addEventListener("click", submit);

      function getTaskIdFromInput() {
        const el = document.getElementById("taskIdInput");
        return (el?.value || "").trim();
      }

      async function queryOnce() {
        try {
          const tid = getTaskIdFromInput();
          if (!tid) throw new Error("请输入 task_id");
          autoPollEnabled = false;
          stopPoll(); // 明确单次查询，不保留轮询
          lsSet(LS_KEYS.testLastTaskId, tid);
          await fetchAndRenderTask(tid, { silent: false });
        } catch (e) {
          toast(e.message, "error");
        }
      }

      document.getElementById("btnQuery").addEventListener("click", queryOnce);

      async function init() {
        // 文本内容回填（无需等待接口）
        const promptEl = document.getElementById("prompt");
        const savedPrompt = lsGet(LS_KEYS.testPrompt);
        if (savedPrompt !== null) promptEl.value = savedPrompt;
        promptEl.addEventListener("input", (e) => lsSet(LS_KEYS.testPrompt, e.target.value));

        // 任务类型缓存（回填发生在 loadTaskTypes 之后）
        const typeEl = document.getElementById("taskType");
        typeEl.addEventListener("change", (e) => lsSet(LS_KEYS.testTaskType, e.target.value || ""));

        await loadApiKey();
        await loadTaskTypes();

        // 恢复上次 task_id，并自动查询进度（切回页面也会刷新）
        const lastTaskId = (lsGet(LS_KEYS.testLastTaskId) || "").trim();
        if (lastTaskId) {
          const input = document.getElementById("taskIdInput");
          if (input) input.value = lastTaskId;
          const d = await fetchAndRenderTask(lastTaskId, { silent: true });
          if (d && d.status !== "completed" && d.status !== "failed") {
            startPoll(lastTaskId);
          }
        }

        async function refreshIfNeeded() {
          const tid = (lsGet(LS_KEYS.testLastTaskId) || "").trim();
          if (!tid) return;
          // 如果正在轮询就不额外触发；否则切回时查询一次并按需继续轮询
          const d = await fetchAndRenderTask(tid, { silent: true });
          if (autoPollEnabled && d && (d.status !== "completed" && d.status !== "failed") && !pollTimer) {
            startPoll(tid);
          }
          if (d && (d.status === "completed" || d.status === "failed")) {
            stopPoll();
          }
        }

        document.addEventListener("visibilitychange", () => {
          if (!document.hidden) refreshIfNeeded();
        });
        window.addEventListener("focus", () => refreshIfNeeded());

        // 便捷：task_id 输入框回车单次查询
        const taskIdInput = document.getElementById("taskIdInput");
        if (taskIdInput) {
          taskIdInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") queryOnce();
          });
        }
      }
      init();
    </script>
  </body>
</html>
